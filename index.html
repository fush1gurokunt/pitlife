function renderGameOver() {
  const el = document.getElementById('screen-gameover');
  let reason = 'Career ended — no more seats available';
  if (S.age >= 40) reason = 'Retired at 40';
  else if (S.burnoutRetired) reason = 'Retired — burnout forced the end';
  const rating = calcRating();
  const legacy = calcLegacyTitle();
  const achievements = calcAchievements();

  const stats = [
    {v:S.championships, l:'Championships', g:S.championships>0},
    {v:S.wins,          l:'Race Wins',      g:false},
    {v:S.podiums,       l:'Podiums',        g:false},
    {v:S.seasonsInF1,   l:'F1 Seasons',     g:false},
    {v:S.log.length,    l:'Total Seasons',  g:false},
    {v:fmtMoney(S.earnings), l:'Career Earnings', g:true}
  ];

  const statBoxes = stats.map(s=>`
    <div class="sum-stat">
      <div class="sum-v ${s.g?'gold':''}">${s.v}</div>
      <div class="sum-l">${s.l}</div>
    </div>`).join('');

  const logItems = S.log.map(e=>{
    const pc = posClass(e.champPos);
    const sfx = ordSuffix(e.champPos);
    let d = `Avg P${e.avgPos}`;
    if (e.champWon) d += ' · 🏆';
    if (e.fired) d += ' · 🔴';
    return `<div class="log-entry">
      <div class="log-h">
        <span class="log-stage">${e.stage}${e.team?` — ${e.team}`:''}</span>
        <span class="log-pos ${pc}">P${e.champPos}${sfx}</span>
      </div>
      <div class="log-detail">${d} · ${fmtMoney(e.earnings)}</div>
    </div>`;
  }).join('');

  const achHtml = achievements.length ? achievements.map(a => `
    <div class="achievement">
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${a.desc}</div>
    </div>`).join('') : '<div style="color:var(--dim);font-size:13px;padding:8px 0">No special achievements this career.</div>';

  el.innerHTML = `
    <div class="go-title">
      <div style="display:flex;justify-content:center;margin-bottom:12px">${buildChibiSVG({...S.chibi||{},seed:S.name||'pitlife'}, 120)}</div>
      <h1>Career Over</h1>
      <p>${esc(reason)}</p>
    </div>
    <div class="legacy-box">
      <div class="legacy-title">${legacy.title}</div>
      <div class="legacy-sub">${legacy.desc}</div>
    </div>
    <div class="rating-box">
      <div style="font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:8px">Career Rating</div>
      <div class="grade">${rating.grade}</div>
      <div class="grade-lbl">${rating.label}</div>
    </div>
    <div class="sum-grid">${statBoxes}</div>
    <div style="width:100%">
      <div class="section-title">Achievements</div>
      <div class="achievements-grid">${achHtml}</div>
    </div>
    <div style="width:100%">
      <div class="section-title">Full Career Log</div>
      <div class="log-list">${logItems}</div>
    </div>
    <button class="btn-primary" onclick="restartGame()" style="margin-top:8px">Play Again</button>`;
}

function calcRating() {
  const sc = S.championships*30 + S.wins*5 + S.podiums*2 + S.seasonsInF1*3;
  if (sc>=200) return {grade:'S', label:'All-time Legend'};
  if (sc>=120) return {grade:'A', label:'Championship Contender'};
  if (sc>=60)  return {grade:'B', label:'Solid F1 Career'};
  if (sc>=25)  return {grade:'C', label:'Journeyman Pro'};
  if (sc>=8)   return {grade:'D', label:'Nearly Made It'};
  return          {grade:'F', label:'Back to Karting'};
}

function calcLegacyTitle() {
  if (S.championships >= 3 && S.wins >= 20) return {title:'Motorsport Icon', desc:'Three titles. Decades of brilliance. Your name belongs in the pantheon.'};
  if (S.championships >= 2) return {title:'Double Champion', desc:'More than once, you conquered the grid. Your legacy is undeniable.'};
  if (S.championships === 1 && S.wins >= 10) return {title:'World Champion', desc:'You reached the summit. Only a handful ever do.'};
  if (S.championships === 1) return {title:'Champion', desc:'Once, the championship was yours. Not everyone gets that moment.'};
  if (S.seasonsInF1 >= 5 && S.podiums >= 10) return {title:'F1 Veteran', desc:'Years in the top flight, countless battles. A respected name in the paddock.'};
  if (S.seasonsInF1 >= 3) return {title:'F1 Racer', desc:'You made it to the pinnacle and competed at the highest level.'};
  if (S.wins >= 5) return {title:'Race Winner', desc:'You stood on the top step. Speed was never your problem.'};
  if (S.podiums >= 3) return {title:'Podium Finisher', desc:'You mixed it with the best and came away with silverware.'};
  if (S.burnoutRetired) return {title:'Burnt Out', desc:"The sport took everything you had. There's no shame in that."};
  return {title:'Journeyman', desc:'You gave everything the sport demanded. Most never make it this far.'};
}

function calcAchievements() {
  const ach = [];
  if (S.championships >= 1) ach.push({icon:'🏆', name:'World Champion', desc:'Won a championship title'});
  if (S.championships >= 3) ach.push({icon:'👑', name:'Dynasty', desc:'Three or more titles'});
  if (S.wins >= 1)  ach.push({icon:'🥇', name:'Race Winner', desc:'Stood on the top step'});
  if (S.wins >= 10) ach.push({icon:'🔟', name:'Ten Wins', desc:'10 race victories'});
  if (S.wins >= 25) ach.push({icon:'🌟', name:'25 Wins', desc:'An all-time great record'});
  if (S.podiums >= 10) ach.push({icon:'🥈', name:'Podium Regular', desc:'10 or more podiums'});
  if (S.seasonsInF1 >= 10) ach.push({icon:'🎖️', name:'F1 Lifer', desc:'10 seasons in Formula 1'});
  if ((S.monacoSeasonWins||0) >= 2) ach.push({icon:'🎰', name:'Monaco Master', desc:'Won at Monaco Royale twice'});
  if ((S.homeSeasonWins||0) >= 1) ach.push({icon:'🏠', name:'Home Hero', desc:'Won the Home Grand Prix'});
  if ((S.runnerUpCount||0) >= 3) ach.push({icon:'😤', name:'The Nearly Man', desc:'Runner-up in championship three times'});
  if ((S.sameTeamSeasons||0) >= 4) ach.push({icon:'🤝', name:'Loyal', desc:'4+ seasons with the same F1 team'});
  if (S.recoveredToF1) ach.push({icon:'💪', name:'Comeback', desc:'Returned to F1 after being dropped'});
  if ((S.incidentCount||0) >= 5) ach.push({icon:'💥', name:'Incident Prone', desc:'5 or more on-track incidents'});
  if (S.burnoutRetired) ach.push({icon:'🔥', name:'Burned Out', desc:'Career ended by total burnout'});
  if (S.earnings >= 50000000) ach.push({icon:'💰', name:'Fifty Million', desc:'£50M+ career earnings'});
  if (ach.length === 0 && S.seasonsInF1 >= 1) ach.push({icon:'🏎️', name:'F1 Driver', desc:'Made it to Formula 1'});
  return ach;
}

function restartGame() {
  clearSave();
  S = null;
  selectedNat = null;
  selectedStyle = 'consistent';
  activeTab = 'season';
  document.getElementById('screen-gameover').style.display = 'none';
  showScreen('start');
  // Reset step flow
  for (let i = 0; i < 4; i++) {
    const p = document.getElementById('step-'+i);
    if (p) { p.classList.toggle('hidden', i !== 0); p.style.opacity = ''; p.style.transition = ''; }
  }
  currentStep = 0;
  updateDots(0);
  // Reset name
  const nameEl = document.getElementById('driver-name');
  if (nameEl) nameEl.value = '';
  const continueBtn = document.getElementById('name-continue-btn');
  if (continueBtn) continueBtn.classList.add('hidden');
  // Reset nat
  const natFlag = document.getElementById('nat-flag-display');
  const natInput = document.getElementById('nat-search');
  if (natFlag) natFlag.textContent = '🌍';
  if (natInput) { natInput.value = ''; natInput.setAttribute('readonly',''); }
  closeNatDropdown();
  // Reset style
  document.querySelectorAll('.style-btn').forEach(b=>b.classList.toggle('sel', b.dataset.style==='consistent'));
  initChibiCreator();
}

function updateCarPreview() {
  const el = document.getElementById('car-preview');
  if (el) el.innerHTML = buildCarSVG();
}

function renderCarTab() {
  const swatches = HELMET_COLORS.map(c =>
    `<button class="helmet-swatch${S.helmetColor===c.hex?' sel':''}"
      style="background:${c.hex}"
      onclick="setHelmetColor('${c.hex}')"
      title="${c.name}"></button>`
  ).join('');

  const liveryCards = LIVERIES.map(l =>
    `<button class="livery-btn${S.livery===l.id?' sel':''}" onclick="setLivery('${l.id}')">
      <div class="livery-preview" style="background:${l.grad}"></div>
      <div class="livery-name">${l.name}</div>
    </button>`
  ).join('');

  document.getElementById('car-sec').innerHTML = `
    <div id="car-preview" style="overflow:hidden;margin-bottom:16px">${buildCarSVG()}</div>

    <div class="section-title">Helmet Colour</div>
    <div class="helmet-grid">${swatches}</div>

    <div class="section-title" style="margin-top:18px">Race Number</div>
    <input class="finput car-input" type="number" min="1" max="99"
      placeholder="1–99" value="${esc(S.raceNumber)}"
      oninput="setRaceNumber(this.value)">

    <div class="section-title" style="margin-top:18px">Car Livery</div>
    <div class="livery-grid">${liveryCards}</div>

    <div class="section-title" style="margin-top:18px">Driver Nickname</div>
    <input class="finput car-input" type="text" maxlength="12"
      placeholder="${esc(S.nickname)}"
      value="${esc(S.customNickname)}"
      onchange="setCustomNickname(this.value)">
    <div style="font-family:'DM Sans',sans-serif;font-size:10px;color:var(--dim);margin-top:6px;margin-bottom:20px">Overrides auto-generated nickname in headlines. Max 12 chars.</div>
  `;
}

function setHelmetColor(hex) {
  S.helmetColor = hex;
  save();
  renderAll();
}

function setLivery(id) {
  S.livery = id;
  save();
  renderAll();
}

function setRaceNumber(val) {
  const n = parseInt(val, 10);
  S.raceNumber = (n >= 1 && n <= 99) ? String(n) : '';
  save();
  updateCarPreview();
  renderHeader();
}

function setCustomNickname(val) {
  S.customNickname = val.trim();
  save();
  renderHeader();
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  buildNatGrid();
  initChibiCreator();
  // Close nat dropdown on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('#nat-dropdown')) closeNatDropdown();
  });

  if (load() && S) {
    if (S.gameOver) {
      showScreen('gameover');
      renderGameOver();
    } else {
      showScreen('game');
      renderAll();
    }
  } else {
    showScreen('start');
  }
});
</script>
