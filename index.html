// RACE SIMULATION
// ══════════════════════════════════════════════

function raceTheSeason() {
  if (S.resolved.length < S.events.length) return;
  if (typeof posthog !== 'undefined') posthog.capture('season_raced', { season: S.seasonNum, stage: stage().label, age: S.age });
  const st = stage();
  const positions = [];
  let playerPts = 0, playerWins = 0, playerPodiums = 0;
  const champDeciderChoice = S.champDeciderChoice;
  S.champDeciderChoice = null;

  for (let r=0; r<st.rounds; r++) {
    let p = simRace(st.cars);
    // Championship decider affects the final round
    if (champDeciderChoice && r === st.rounds - 1) {
      if (champDeciderChoice === 'engine') {
        p = Math.random() < 0.60 ? 1 : st.cars; // 60% win / 40% DNF
      } else {
        p = Math.min(2, p); // guaranteed at most P2
      }
    }
    positions.push(p);
    playerPts += ptsFor(p);
    if (p===1) playerWins++;
    if (p<=3) playerPodiums++;
  }

  const avgPos = Math.round(positions.reduce((a,b)=>a+b,0)/st.rounds);
  const aiPool = S.stageIdx===4 ? F1_AI : FEEDER_AI;
  const standings = buildStandings(aiPool, st.cars, st.rounds, playerPts);
  const champPos = standings.findIndex(r=>r.me)+1;

  // Form streak tracking
  const pointsThreshold = S.stageIdx === 4 ? 10 : Math.ceil(st.cars / 2);
  const inPoints = champPos <= pointsThreshold;
  const prevStreak = S.pointsStreak || 0;
  if (inPoints) {
    S.pointsStreak = prevStreak + 1;
    S.bestStreak = Math.max(S.bestStreak || 0, S.pointsStreak);
    S._streakBroken = false;
    S._brokenStreakLen = 0;
  } else {
    S._streakBroken = prevStreak >= 3;
    S._brokenStreakLen = prevStreak;
    S.pointsStreak = 0;
  }

  // Build full league standings with flag/team/form
  const rivals = S.seasonRivals || [];
  S.leagueStandings = standings.map(d => {
    const rival = rivals.find(r => r.name === d.name);
    const avgPts = d.pts / st.rounds;
    const form = d.me
      ? positions.slice(-5).map(p => p===1?'win':ptsFor(p)>0?'pts':'none')
      : Array.from({length:5}, () => {
          const rv = Math.random();
          if (avgPts >= 12) return rv < 0.45 ? 'win' : rv < 0.88 ? 'pts' : rv < 0.96 ? 'none' : 'dnf';
          if (avgPts >= 4)  return rv < 0.10 ? 'win' : rv < 0.60 ? 'pts' : rv < 0.90 ? 'none' : 'dnf';
          return rv < 0.03 ? 'win' : rv < 0.28 ? 'pts' : rv < 0.80 ? 'none' : 'dnf';
        });
    const teamName = d.me
      ? (S.stageIdx===4 && f1team() ? f1team().name : st.label)
      : (rival ? rival.team : '');
    const tier = d.me
      ? (S.stageIdx===4 && f1team() ? f1team().tier : null)
      : (rival ? rival.tier : null);
    return {...d, flag: d.me ? S.natFlag : (rival ? rival.flag : ''), team: teamName, form, tier};
  });

  // Resolve sponsor obligations
  const sponsorResults = [];
  if (S.activeSponsors && S.activeSponsors.length) {
    for (const sp of S.activeSponsors) {
      let met = false;
      if (sp.condition === 'top8')   met = champPos <= 8;
      if (sp.condition === 'rep50')  met = S.Reputation >= 50;
      if (sp.condition === 'podium') met = champPos <= 3;
      if (!met && sp.penalty)    S.earnings = Math.max(0, S.earnings - sp.penalty);
      if (met && sp.bonusBonus)  S.earnings += sp.bonusBonus;
      sponsorResults.push({name:sp.name, icon:sp.icon||'📋', met, penalty:sp.penalty||0, bonusBonus:sp.bonusBonus||0, conditionDesc:sp.conditionDesc||''});
    }
    S.activeSponsors = [];
  }
  S.lastSponsorResults = sponsorResults;

  // Earnings
  let seasonEarn;
  if (S.stageIdx===4) {
    const t = f1team();
    seasonEarn = t ? t.pay : 2000000;
    seasonEarn += playerWins * Math.round(seasonEarn * 0.03);
  } else {
    seasonEarn = st.earnings;
    if (champPos===1) seasonEarn = Math.round(seasonEarn * 1.3);
  }
  S.earnings += seasonEarn;
  const winsBeforeRace = S.wins;
  S.wins += playerWins;
  S.podiums += playerPodiums;
  if (champPos===1) S.championships++;

  // PitCoin awards
  awardPitcoins(50, 'Season completed');
  if (playerWins > 0) awardPitcoins(playerWins * 25, playerWins + (playerWins > 1 ? ' wins' : ' win'));
  if (champPos===1) awardPitcoins(200, 'Championship!');

  // Stat changes from season performance
  const deltas = {};
  const deltaReasons = {};
  function addDelta(k, v, reason) {
    deltas[k] = (deltas[k]||0) + v;
    S[k] = clamp(S[k]+v, 0, 100);
    if (reason) deltaReasons[k] = reason;
  }

  if (avgPos <= 3) { addDelta('Racecraft',3,'Consistently fighting at the front honed your wheel-to-wheel instincts.'); }
  if (avgPos <= Math.ceil(st.cars/2)) {
    addDelta('Consistency',2,'Finishing in the top half all season proved your reliability.');
    addDelta('Morale',3,'Strong results kept your head in a good place across the campaign.');
    addDelta('Reputation',3,'Consistent performances raised your profile in the paddock.');
  } else {
    addDelta('Morale',-4,'A difficult season away from the points ground you down.');
    addDelta('Reputation',-3,'Results below the midfield hurt your standing with the teams.');
  }
  if (champPos===1) {
    addDelta('Reputation',8,'A championship win is the highest possible statement of intent.');
    addDelta('Morale',6,'The title fills you with the kind of pride that stays with you.');
  }
  if (playerWins >= 3) addDelta('Reputation',4,'Three or more race wins put you in elite company.');
  // Small natural pace growth
  const paceGrow = rnd(0,2);
  if (paceGrow > 0) addDelta('Pace', paceGrow, 'Experience and conditioning bring natural improvement season on season.');

  // Promotion / firing / team movement
  let promoted = false, fired = false, promotedTo = null, newTeamName = null;

  if (S.stageIdx < 4) {
    if (champPos <= st.promoteTop) {
      promoted = true;
      promotedTo = STAGES[S.stageIdx+1].label;
    }
    if (avgPos >= st.cars-1 && S.Reputation < 25) { fired = true; }
  } else {
    S.seasonsInF1++;
    const bad = avgPos > 15 && S.Reputation < 35;
    const veryBad = S.consecutiveBadF1 >= 1 && avgPos > 14;
    if (bad || veryBad) {
      fired = true;
      S.consecutiveBadF1++;
    } else {
      S.consecutiveBadF1 = 0;
      // Upgrade team if strong result + not locked
      if (champPos <= 3 && !S.contractLocked) {
        const t = f1team();
        if (t && t.tier > 1) {
          const better = F1_TEAMS.filter(x=>x.tier < t.tier);
          if (better.length) {
            const pick = better[rnd(0,better.length-1)];
            S.f1TeamIdx = F1_TEAMS.indexOf(pick);
            newTeamName = pick.name;
            promoted = true;
            promotedTo = 'Formula 1';
          }
        }
      }
      // Free agent — find new team
      if (S.freeAgent) {
        const tiers = S.Reputation>=70?[1,2]:S.Reputation>=45?[2,3]:[3];
        const eligible = F1_TEAMS.filter(t=>tiers.includes(t.tier));
        const pick = eligible[rnd(0,eligible.length-1)];
        S.f1TeamIdx = F1_TEAMS.indexOf(pick);
        newTeamName = pick.name;
      }
    }
  }

  const wasRain = S.weatherRainForecast || false;
  const circuitName = S.currentCircuit ? S.currentCircuit.name : null;

  const logEntry = {
    season:S.seasonNum, stage:st.label, avgPos, champPos,
    wins:playerWins, podiums:playerPodiums, earnings:seasonEarn,
    champWon:champPos===1, promoted, fired, promotedTo, newTeamName,
    team: S.stageIdx===4 ? f1team()?.name : (S.feederTeam||null),
    wasRain, circuitName
  };
  S.log.unshift(logEntry);

  S.lastResult = {
    ...logEntry, deltas, deltaReasons, standings:standings.slice(0,5), totalCars:st.cars,
    sponsorResults, champDeciderUsed: !!champDeciderChoice,
    champDeciderFinalPos: champDeciderChoice ? positions[st.rounds-1] : null,
    champDeciderChoice
  };

  S.age++;
  S.seasonNum++;

  // Stat unlocks from race results
  tryUnlock('Pace', 'Race data reveals your raw speed for the first time.');
  tryUnlock('Consistency', 'A full season of results shows your reliability under pressure.');

  // Physical decline
  if (S.age > 33) S.Fitness = clamp(S.Fitness - 2, 0, 100);
  if (S.age > 35) S.Pace = clamp(S.Pace - 1, 0, 100);

  // Burnout from race results
  if (!S.Burnout) S.Burnout = 0;
  if (champPos === 1) {
    S.Burnout = clamp(S.Burnout - 5, 0, 100); // winning is energising
  } else if (avgPos > Math.ceil(st.cars * 0.75)) {
    S.Burnout = clamp(S.Burnout + 8, 0, 100); // bad results grind you down
  } else {
    S.Burnout = clamp(S.Burnout + 3, 0, 100); // racing is taxing regardless
  }

  // Burnout forced retirement
  if (S.Burnout >= 100) {
    S.burnoutRetired = true;
    S.gameOver = true;
  }

  // Track monaco/home wins
  const circ = S.currentCircuit;
  if (circ) {
    if (circ.special === 'monaco' && champPos === 1) S.monacoSeasonWins = (S.monacoSeasonWins||0)+1;
    if (circ.special === 'home' && champPos === 1) S.homeSeasonWins = (S.homeSeasonWins||0)+1;
  }
  if (champPos === 2) S.runnerUpCount = (S.runnerUpCount||0)+1;

  // Track consecutive seasons with same F1 team
  if (S.stageIdx === 4) {
    if (S.f1TeamIdx === S.lastF1TeamIdx) {
      S.sameTeamSeasons = (S.sameTeamSeasons||0)+1;
    } else {
      S.sameTeamSeasons = 1;
    }
    S.lastF1TeamIdx = S.f1TeamIdx;
  }

  // Apply promotion/demotion to stage
  const isFirstWin = playerWins > 0 && winsBeforeRace === 0;
  if (promoted && S.stageIdx < 4) {
    S.pendingPromotion = S.stageIdx + 1;
    if (S.stageIdx + 1 === 4 && S.firedCount > 0) S.recoveredToF1 = true;
    if (typeof posthog !== 'undefined') posthog.capture('stage_promoted', { new_stage: STAGES[S.stageIdx+1].label });
  } else if (fired) {
    const hasSecondChance = (S.ownedBoosts || {}).second_chance > 0;
    if (hasSecondChance) {
      S.ownedBoosts.second_chance--;
      S._secondChanceUsed = true;
    } else {
      S.firedCount++;
      if (S.stageIdx === 4) {
        if (S.firedCount >= 2) {
          S.gameOver = true;
        } else {
          const back = F1_TEAMS.filter(t=>t.tier===3);
          S.f1TeamIdx = F1_TEAMS.indexOf(back[rnd(0,back.length-1)]);
        }
      } else {
        if (S.firedCount >= 3) S.gameOver = true;
      }
    }
  } else {
    S.firedCount = 0;
  }

  if (S.age >= 40) S.gameOver = true;
  if (S.gameOver && typeof posthog !== 'undefined') {
    const endReason = S.burnoutRetired ? 'burnout' : S.age >= 40 ? 'age' : 'fired';
    posthog.capture('career_ended', { reason: endReason, age: S.age, titles: S.championships });
  }
  if (!S.gameOver) genEvents();

  // Pick cinematic (priority order: debut > f1debut > fired > first win > retirement)
  let cinematicLines = null;
  if (!S._debutDone) {
    S._debutDone = true;
    cinematicLines = [
      {text:'YOUR CAREER\nBEGINS', cls:'bright', ms:1800},
      {text:S.name.toUpperCase()+'\n'+S.natFlag+' '+S.nat, cls:'', ms:1800},
      {text:'THE FIRST LAP\nOF MANY', cls:'', ms:2000}
    ];
  } else if (S.stageIdx===4 && S.seasonsInF1===1 && !S._f1DebutDone) {
    S._f1DebutDone = true;
    cinematicLines = [
      {text:'FORMULA 1', cls:'bright', ms:1600},
      {text:'YOU MADE IT', cls:'result-win', ms:2200},
      {text:(f1team()?.name||'F1').toUpperCase()+'\nWELCOMES YOU', cls:'', ms:2000}
    ];
  } else if (fired) {
    cinematicLines = [
      {text:'SEASON REVIEW', cls:'bright', ms:1400},
      {text:'THE TEAM HAS MADE\nA DECISION', cls:'', ms:1800},
      {text:"YOU'VE BEEN\nRELEASED", cls:'result-lose', ms:2500}
    ];
  } else if (S.gameOver) {
    cinematicLines = [
      {text:'YOUR FINAL SEASON', cls:'bright', ms:1800},
      {text:(S.seasonNum-1)+' SEASONS\n'+S.wins+' WINS', cls:'', ms:2200},
      {text:'THANK YOU\nFOR RACING', cls:'result-p2', ms:2800}
    ];
  }

  save();
  if (S._secondChanceUsed) { S._secondChanceUsed = false; showToast('🛡️ Second Chance used — firing avoided!', 3500); }
  showRaceCutscene(() => {
    if (cinematicLines) {
      showCinematic(cinematicLines, showResults);
    } else {
      showResults();
    }
  });
}

function assignF1Team() {
  const tier = S.Reputation>=70 ? 1 : S.Reputation>=45 ? 2 : 3;
  const pool = F1_TEAMS.filter(t=>t.tier===tier);
  S.f1TeamIdx = F1_TEAMS.indexOf(pool[rnd(0,pool.length-1)]);
  S.teamCarRating = tier===1 ? rnd(72,88) : tier===2 ? rnd(50,68) : rnd(28,46);
}
function assignFeederTeam() {
  const teams = STAGE_TEAMS[S.stageIdx];
  if (teams) S.feederTeam = teams[rnd(0, teams.length-1)];
}

// ─── QUALIFYING ───
function fmtLapTime(ms) {
  const m = Math.floor(ms / 60000);
  const s = Math.floor((ms % 60000) / 1000);
  const mm = ms % 1000;
  return `${m}:${String(s).padStart(2,'0')}.${String(mm).padStart(3,'0')}`;
}

function generateQuali() {
  const st = stage();
  let score = (S.Pace*0.40 + S.Racecraft*0.30 + S.Consistency*0.30) / 100;
  score += (S.Morale - 50) / 400;
  if (S.stageIdx === 4) {
    const cr = S.teamCarRating !== null ? S.teamCarRating : 35;
    score += (cr - 50) / 250;
  } else {
    score += S.Reputation / 500;
  }
  score = clamp(score + (Math.random() * 0.20 - 0.10), 0, 1);
  const playerPos = clamp(Math.round((1 - score) * (st.cars - 1)) + 1, 1, st.cars);
  S.qualiPos = playerPos;

  const aiPool = S.stageIdx === 4 ? F1_AI : FEEDER_AI;
  const baseTime = S.stageIdx === 4 ? 85000 : S.stageIdx >= 2 ? 95000 : 110000;
  const MAX = Math.min(st.cars, 10);

  // Build display list: top slots + always include player
  const showPos = new Set();
  for (let i = 1; i <= Math.min(MAX - 1, 8); i++) showPos.add(i);
  showPos.add(playerPos);
  const posList = [...showPos].sort((a, b) => a - b).slice(0, MAX);

  const aiNames = [...aiPool];
  let aiIdx = 0;
  return posList.map(pos => {
    const isMe = pos === playerPos;
    const gap = (pos - 1) * rnd(120, 380);
    const lapMs = baseTime + gap + rnd(-40, 40);
    const name = isMe ? S.name : aiNames[aiIdx++ % aiNames.length];
    return { pos, name, time: fmtLapTime(lapMs), me: isMe };
  });
}

function showQualifying() {
  if (S.resolved.length < S.events.length) return;
  const entries = generateQuali();
  const circuitName = S.currentCircuit ? S.currentCircuit.name : 'Circuit';
  document.getElementById('qualify-overlay').classList.remove('hidden');
  document.getElementById('quali-track-name').textContent = circuitName;
  document.getElementById('quali-fill').style.width = '0%';
  document.getElementById('quali-grid').innerHTML = '';
  document.getElementById('quali-continue-btn').classList.add('hidden');
  doFlyingLap(entries);
}

function doFlyingLap(entries) {
  const fill = document.getElementById('quali-fill');
  const totalMs = 2800;
  const start = performance.now();
  function tick() {
    const elapsed = performance.now() - start;
    const pct = Math.min(elapsed / totalMs * 100, 100);
    fill.style.width = pct + '%';
    if (pct < 100) { requestAnimationFrame(tick); }
    else { revealQualiResult(entries); }
  }
  requestAnimationFrame(tick);
}

// ─── TEAM CHOICE ───
function buildPromotionOptions(newIdx) {
  if (newIdx === 4) {
    const repReqs = [40, 55, 70];
    return [3, 2, 1].map((tier, i) => {
      const pool = F1_TEAMS.filter(t => t.tier === tier);
      const team = pool[rnd(0, pool.length - 1)];
      const locked = S.Reputation < repReqs[i];
      return {
        team: team.name, f1idx: F1_TEAMS.indexOf(team), tier, locked,
        detail: `${STAGES[newIdx].label} · Tier ${tier} team · ${(team.pay/1000000).toFixed(1)}M salary`,
        lockMsg: locked ? `Requires ${repReqs[i]} Reputation` : null
      };
    });
  } else {
    const teams = STAGE_TEAMS[newIdx] || [];
    const shuffled = [...teams].sort(() => Math.random() - 0.5).slice(0, 3);
    return shuffled.map(name => ({
      team: name, f1idx: null, locked: false,
      detail: STAGES[newIdx].label, lockMsg: null
    }));
  }
}

function renderTeamChoiceScreen() {
  const newIdx = S.pendingPromotion;
  const seriesName = STAGES[newIdx].label;
  document.getElementById('tc-series-name').textContent = `Promoted to ${seriesName}`;
  const options = buildPromotionOptions(newIdx);
  window._tcOptions = options;
  document.getElementById('tc-cards').innerHTML = options.map((opt, i) =>
    `<div class="tc-card${opt.locked?' locked':''}" onclick="selectTeam(${i})">
      <div class="tc-team">${esc(opt.team)}</div>
      <div class="tc-detail">${opt.detail}</div>
      ${opt.lockMsg ? `<div class="tc-lock">🔒 ${opt.lockMsg}</div>` : ''}
    </div>`).join('');
  document.getElementById('team-choice-overlay').classList.remove('hidden');
}

function selectTeam(i) {
  const opt = (window._tcOptions || [])[i];
  if (!opt || opt.locked) return;
  document.getElementById('team-choice-overlay').classList.add('hidden');
  S.stageIdx = S.pendingPromotion;
  S.pendingPromotion = false;
  if (S.stageIdx === 4) {
    S.f1TeamIdx = opt.f1idx;
    const t = F1_TEAMS[opt.f1idx];
    S.teamCarRating = t.tier===1 ? rnd(72,88) : t.tier===2 ? rnd(50,68) : rnd(28,46);
    if (!S._premierBonusPaid) { S._premierBonusPaid = true; awardPitcoins(150, 'Reached Premier Series!'); }
  } else {
    S.feederTeam = opt.team;
  }
  save();
  renderAll();
}

// ─── AI GRAPHICS ───
async function generateImage(prompt, cacheKey) {
  const k = 'ai_img_' + cacheKey;
  const cached = sessionStorage.getItem(k);
  if (cached) return cached;
  try {
    const res = await fetch('/api/generate-image', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt, size: '1792x1024'})
    });
    const data = await res.json();
    if (data.url) { sessionStorage.setItem(k, data.url); return data.url; }
  } catch(e) {}
  return null;
}

function toggleAIGraphics() {
  AI_GRAPHICS = !AI_GRAPHICS;
  localStorage.setItem('ai_graphics_enabled', AI_GRAPHICS ? 'true' : 'false');
  if (!AI_GRAPHICS) {
    for (const k of Object.keys(sessionStorage)) {
      if (k.startsWith('ai_img_')) sessionStorage.removeItem(k);
    }
  }
  renderAll();
}

async function showRaceCutscene(callback) {
  if (!AI_GRAPHICS) { callback(); return; }
  const overlay = document.getElementById('ai-race-overlay');
  const bg = document.getElementById('ai-race-bg');
  const spinner = document.getElementById('ai-race-spinner');
  const textEl = document.getElementById('ai-race-text');
  if (!overlay) { callback(); return; }

  const st = stage();
  const circuit = S.currentCircuit ? S.currentCircuit.name : 'a racing circuit';
  const prompt = `Dramatic ${st.label} race scene at ${circuit}, cinematic action photography, racing cars at high speed, motion blur, atmospheric lighting, wide angle, photorealistic`;
  const cacheKey = ('race_' + S.stageIdx + '_' + (S.currentCircuit ? S.currentCircuit.id : 'generic')).replace(/[^a-z0-9_]/gi,'_');

  overlay.classList.remove('hidden');
  spinner.classList.remove('hidden');
  bg.style.backgroundImage = '';
  bg.classList.remove('loaded');
  textEl.textContent = st.label.toUpperCase() + '\nRACE DAY';

  const url = await generateImage(prompt, cacheKey);
  if (url) {
    const img = new Image();
    img.onload = () => { bg.style.backgroundImage = 'url(' + url + ')'; bg.classList.add('loaded'); spinner.classList.add('hidden'); };
    img.src = url;
  } else {
    spinner.classList.add('hidden');

  setTimeout(() => {

    callback();
  }, 6000);

async function updateAIHelmet() {

function showCinematic(lines, callback) {
  const outcome = document.getElementById('champ-outcome');
  const lapText = document.getElementById('champ-lap-text');
  if (!outcome || !lapText) { callback(); return; }
  outcome.classList.remove('hidden');
  lapText.className = 'champ-lap';
  lapText.style.opacity = '0';
  lapText.textContent = '';
  let idx = 0;
  function showNext() {
    if (idx >= lines.length) { outcome.classList.add('hidden'); callback(); return; }
    const s = lines[idx++];
    lapText.className = 'champ-lap ' + (s.cls || '');
    lapText.style.whiteSpace = 'pre-line';
    lapText.textContent = s.text;
    lapText.style.opacity = '0';
    requestAnimationFrame(() => { requestAnimationFrame(() => { lapText.style.opacity = '1'; }); });
    setTimeout(() => { lapText.style.opacity = '0'; setTimeout(showNext, 600); }, s.ms || 1800);
  }
  showNext();
}

function onAllocChange() {

function confirmBudget() {

  if (inf < 0) return;

  const carSpend = budget * car / 100;
  const drvSpend = budget * drv / 100;
  const infSpend = budget * inf / 100;
  S._mgrCarRating = Math.min(95, S._mgrCarRating + Math.round(carSpend / 4000000));
  S._mgrDriverBudget = drvSpend;
  S._mgrInfraBank = Math.round(infSpend * 0.5);

let _mgrPool = [];
function renderDriversPhase() {
  const content = document.getElementById('mgr-content');
  if (!content) return;
  if (!_mgrPool.length) {
    const names = [...FEEDER_AI, ...F1_AI.map(n => n.split(' ')[0])].sort(() => Math.random()-0.5).slice(0, 6);
    _mgrPool = names.map(name => {
      const rating = clamp(Math.round(25 + Math.random() * 65), 25, 90);
      const salary = Math.round(rating * 200000);
      return {name, flag: RIVAL_FLAGS[Math.floor(Math.random()*RIVAL_FLAGS.length)], rating, salary};
    }).sort((a,b) => b.rating - a.rating);
  }
  const drvBudget = S._mgrDriverBudget || 0;
  const selected = S._mgrDrivers || [];
  const totalSalary = selected.reduce((s,d) => s + d.salary, 0);
  const canConfirm = selected.length === 2;

  const cards = _mgrPool.map((d, i) => {
    const isSel = selected.some(s => s.name === d.name);
    const overBudget = d.salary > drvBudget && !isSel;
    const carReq = d.rating >= 78 && S._mgrCarRating < 65;
    const locked = (overBudget || carReq) && !isSel;
    const lockNote = carReq ? 'Requires car rating 65+' : 'Over driver budget';
    return `<div class="driver-card${isSel?' selected':''}${locked?' locked':''}" onclick="${locked?'':'toggleMgrDriver('+i+')'}" >
      <div class="driver-rating" style="color:${d.rating>=75?'#d4af37':d.rating>=55?'rgba(255,255,255,.85)':'rgba(255,255,255,.5)'}">${d.rating}</div>

        <div class="driver-name">${d.flag} ${esc(d.name)}</div>
        <div class="driver-salary">${fmtMoney(d.salary)}/season${locked?' · '+lockNote:''}</div>
      </div>
      ${isSel ? '<span style="color:#d4af37;font-size:20px;flex-shrink:0">✓</span>' : ''}
    </div>`;
  }).join('');

  content.innerHTML = `
    <div class="mgr-phase-title">DRIVER MARKET</div>
    <div class="mgr-phase-sub">Pick 2 drivers. Driver budget: ${fmtMoney(drvBudget)}<br>${selected.length}/2 selected · Salaries: ${fmtMoney(totalSalary)}</div>
    ${cards}
    <button class="mgr-confirm-btn" ${canConfirm?'':'disabled'} onclick="confirmDrivers()">CONFIRM LINE-UP →</button>
  `;
}

function toggleMgrDriver(idx) {
  const d = _mgrPool[idx];
  if (!d) return;
  if (!S._mgrDrivers) S._mgrDrivers = [];
  const existing = S._mgrDrivers.findIndex(s => s.name === d.name);
  if (existing >= 0) {
    S._mgrDrivers.splice(existing, 1);
  } else {
    if (S._mgrDrivers.length >= 2) { showToast('Already have 2 drivers — deselect one first'); return; }
    S._mgrDrivers.push(d);
  }
  renderDriversPhase();
}

function confirmDrivers() {
  if ((S._mgrDrivers || []).length !== 2) return;
  _mgrPool = [];
  S._mgrPhase = 'result';
  S._mgrLastResult = simulateMgrSeason();
  save();
  renderManagerScreen();
}

function simulateMgrSeason() {
  const drivers = S._mgrDrivers || [];
  const avgDrv = drivers.length === 2 ? (drivers[0].rating + drivers[1].rating) / 2 : 40;
  const score = clamp(S._mgrCarRating * 0.5 + avgDrv * 0.5 + (Math.random() * 30 - 15), 1, 99);
  const aiScores = MGR_AI_TEAMS.map(name => ({name, score: clamp(rnd(20,88) + (Math.random()*10-5), 1, 99)}));
  const all = [{name: S._mgrTeamName, score, isPlayer: true}, ...aiScores];
  all.sort((a,b) => b.score - a.score);
  const ptsList = [178,154,130,110,92,76,62,50,40,32];
  const standings = all.slice(0, 10).map((t, i) => ({name: t.name, isPlayer: !!t.isPlayer, pts: ptsList[i] || 0}));
  const pos = standings.findIndex(s => s.isPlayer) + 1 || 10;
  return {pos, standings};
}

function renderResultPhase() {
  const content = document.getElementById('mgr-content');
  if (!content) return;
  const result = S._mgrLastResult;
  if (!result) { renderBudgetPhase(); return; }
  const prize = MGR_PRIZE[Math.min(result.pos-1, MGR_PRIZE.length-1)] || 0;
  const isChamp = result.pos === 1;
  const drivers = S._mgrDrivers || [];

  const rows = result.standings.map((t, i) => `
    <tr class="${t.isPlayer?'player-row':''}">
      <td class="mgr-pos" style="color:${i===0?'#d4af37':'rgba(255,255,255,.5)'}">${i+1}</td>
      <td>${t.isPlayer ? '🟥 ' : ''}${esc(t.name)}</td>
      <td style="text-align:right;font-family:'DM Sans',sans-serif;font-size:11px">${t.pts}</td>
    </tr>`).join('');

  content.innerHTML = `
    <div class="mgr-phase-title">SEASON ${S._mgrSeason} RESULT</div>
    <div style="text-align:center;margin-bottom:18px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:3.5rem;letter-spacing:2px;color:${isChamp?'#d4af37':'rgba(255,255,255,.85)'}">P${result.pos}</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:12px;color:rgba(255,255,255,.4)">Constructors' Championship</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#4ade80;margin-top:6px">+${fmtMoney(prize)} prize money</div>
      ${drivers.length ? `<div style="font-family:'DM Sans',sans-serif;font-size:11px;color:rgba(255,255,255,.35);margin-top:4px">Drivers: ${drivers.map(d=>d.flag+' '+d.name+' ('+d.rating+')').join(' · ')}</div>` : ''}
    </div>
    <table class="mgr-standings">
      <thead><tr><th>Pos</th><th>Constructor</th><th style="text-align:right">Pts</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <button class="mgr-confirm-btn" style="margin-top:22px" onclick="advanceMgrSeason()">${isChamp ? "🏆 YOU'RE CHAMPIONS! NEXT SEASON →" : 'NEXT SEASON →'}</button>
    <button class="mgr-confirm-btn" style="margin-top:8px;background:rgba(255,255,255,.07);color:rgba(255,255,255,.4)" onclick="proceedToGameOver()">Retire from Management</button>
  `;
}

function advanceMgrSeason() {
  const result = S._mgrLastResult;
  if (!result) return;
  const prize = MGR_PRIZE[Math.min(result.pos-1, MGR_PRIZE.length-1)] || 0;
  const newBudget = prize + (S._mgrInfraBank || 0);

  if (result.pos === 1) {
    const lines = [
      {text:'CONSTRUCTORS\'\nCHAMPIONS', cls:'result-win', ms:2400},
      {text:'YOU BUILT A\nCHAMPION TEAM', cls:'bright', ms:2600},
      {text:esc(S._mgrTeamName).toUpperCase()+'\nSEASON '+S._mgrSeason, cls:'', ms:2000}
    ];
    S._mgrHistory = [...(S._mgrHistory||[]), {season: S._mgrSeason, pos: result.pos}];
    S._mgrSeason++;
    S._mgrLastResult = null;
    S._mgrPhase = 'budget';
    S._mgrBudget = newBudget;
    S._mgrInfraBank = 0;
    S._mgrDrivers = [];
    save();
    showCinematic(lines, () => { showScreen('manager'); renderManagerScreen(); });
    return;
  }

  if (newBudget < 2000000) {
    const lines = [
      {text:'THE FACTORY\nGOES QUIET', cls:'result-lose', ms:2400},
      {text:'THE DREAM\nIS OVER', cls:'result-p2', ms:2600}
    ];
    S._mgrHistory = [...(S._mgrHistory||[]), {season: S._mgrSeason, pos: result.pos}];
    save();
    showCinematic(lines, () => { proceedToGameOver(); });
    return;
  }

  S._mgrHistory = [...(S._mgrHistory||[]), {season: S._mgrSeason, pos: result.pos}];
  S._mgrSeason++;
  S._mgrLastResult = null;
  S._mgrPhase = 'budget';
  S._mgrBudget = newBudget;
  S._mgrInfraBank = 0;
  S._mgrDrivers = [];
  save();
  showScreen('manager');
  renderManagerScreen();
}

function showToast(msg, duration) {
  const tc = document.getElementById('toast-container');
  if (!tc) return;
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  tc.appendChild(el);
  requestAnimationFrame(() => { requestAnimationFrame(() => { el.classList.add('show'); }); });
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 400); }, duration || 2800);
}

function awardPitcoins(amount, reason) {
  if (!S) return;
  S.pitcoins = (S.pitcoins || 0) + amount;
  showToast('🪙 +' + amount + ' PitCoins' + (reason ? ' — ' + reason : ''));
}

let _adCooldown = false;
function watchAd() {
  if (_adCooldown) return;
  _adCooldown = true;
  const btn = document.getElementById('ad-btn');
  if (btn) { btn.disabled = true; btn.textContent = '📺 Ad playing… 5'; }
  let t = 5;
  const iv = setInterval(() => {
    t--;
    if (btn) btn.textContent = t > 0 ? '📺 Ad playing… ' + t : '✅ Reward earned!';
    if (t <= 0) {
      clearInterval(iv);
      awardPitcoins(75, 'Rewarded ad');
      save();
      if (btn) { btn.disabled = false; btn.textContent = '📺 Watch an ad for 75 PitCoins'; }
      // Cooldown 60 seconds to prevent spam
      setTimeout(() => { _adCooldown = false; }, 60000);
      // Update header coins
      renderHeader();
    }
  }, 1000);
}

function renderShop() {
  const owned = S.ownedHelmets || [];
  const features = S.ownedFeatures || [];
  const boosts = S.ownedBoosts || {};
  const coins = S.pitcoins || 0;

  const helmetCards = SHOP_HELMETS.map(h => {
    const isOwned = owned.includes(h.id);
    const isPremium = h.price === null;
    const canAfford = !isPremium && coins >= h.price;
    const right = isPremium
      ? `<div class="shop-card-right"><span class="shop-premium-badge">💎 Premium</span></div>`
      : isOwned
        ? `<div class="shop-card-right"><span class="shop-owned-badge">✓ Owned</span><button class="shop-buy-btn" onclick="useHelmet('${h.id}')">USE</button></div>`
        : `<div class="shop-card-right"><span class="shop-card-price">${h.price}🪙</span><button class="shop-buy-btn"${canAfford?'':' disabled'} onclick="buyHelmet('${h.id}')">UNLOCK</button></div>`;
    return `<div class="shop-card">
      <div class="shop-helmet-dot" style="background:${h.color}"></div>
      <div class="shop-card-info"><div class="shop-card-name">${h.name}</div><div class="shop-card-desc">${h.desc}</div></div>
      ${right}</div>`;
  }).join('');

  const featureCards = SHOP_FEATURES.map(f => {
    const isOwned = features.includes(f.id);
    const canAfford = coins >= f.price;
    const right = isOwned
      ? `<div class="shop-card-right"><span class="shop-owned-badge">✓ Unlocked</span></div>`
      : `<div class="shop-card-right"><span class="shop-card-price">${f.price}🪙</span><button class="shop-buy-btn"${canAfford?'':' disabled'} onclick="buyFeature('${f.id}')">UNLOCK</button></div>`;
    return `<div class="shop-card">
      <div class="shop-card-info"><div class="shop-card-name">${f.name}</div><div class="shop-card-desc">${f.desc}</div></div>
      ${right}</div>`;
  }).join('');

  const boostCards = SHOP_BOOSTS.map(b => {
    const qty = boosts[b.id] || 0;
    const canAfford = coins >= b.price;
    return `<div class="shop-card">
      <div class="shop-card-info"><div class="shop-card-name">${b.name}${qty > 0 ? ' <span style="color:#fbbf24">×'+qty+'</span>' : ''}</div><div class="shop-card-desc">${b.desc}</div></div>
      <div class="shop-card-right"><span class="shop-card-price">${b.price}🪙</span><button class="shop-buy-btn"${canAfford?'':' disabled'} onclick="buyBoost('${b.id}')">BUY</button></div>
      </div>`;
  }).join('');

  document.getElementById('shop-sec').innerHTML = `
    <div style="text-align:center;margin:12px 0 4px">
      <span class="hdr-coins" style="font-size:15px;padding:6px 14px">🪙 ${coins} PitCoins</span>
    </div>
    <div class="shop-section-hd">🪖 Helmet Designs</div>
    ${helmetCards}
    <div class="shop-section-hd">⚙️ Features</div>
    ${featureCards}
    <div class="shop-section-hd">⚡ Career Boosts</div>
    ${boostCards}
  `;
}

function buyHelmet(id) {
  const h = SHOP_HELMETS.find(x => x.id === id);
  if (!h || h.price === null) return;
  if ((S.pitcoins || 0) < h.price) { showToast('❌ Not enough PitCoins'); return; }
  S.pitcoins -= h.price;
  S.ownedHelmets = [...(S.ownedHelmets || []), id];
  save();
  showToast('✅ ' + h.name + ' helmet unlocked!');
  renderShop();
  renderHeader();
}

function useHelmet(id) {
  const h = SHOP_HELMETS.find(x => x.id === id);
  if (!h) return;
  S.helmetColor = h.color;
  save();
  showToast('🪖 ' + h.name + ' helmet equipped!');
  renderAll();
}

function buyFeature(id) {
  const f = SHOP_FEATURES.find(x => x.id === id);
  if (!f) return;
  if ((S.pitcoins || 0) < f.price) { showToast('❌ Not enough PitCoins'); return; }
  S.pitcoins -= f.price;
  S.ownedFeatures = [...(S.ownedFeatures || []), id];
  save();
  showToast('✅ ' + f.name + ' unlocked!');
  renderShop();
  renderHeader();
}

function buyBoost(id) {
  const b = SHOP_BOOSTS.find(x => x.id === id);
  if (!b) return;
  if ((S.pitcoins || 0) < b.price) { showToast('❌ Not enough PitCoins'); return; }
  S.pitcoins -= b.price;
  S.ownedBoosts = S.ownedBoosts || {};
  S.ownedBoosts[id] = (S.ownedBoosts[id] || 0) + 1;
  save();
  showToast('✅ ' + b.name + ' added to inventory!');
  renderShop();
  renderHeader();
}

function useBoost(id) {
  const boosts = S.ownedBoosts || {};
  if (!boosts[id] || boosts[id] <= 0) return;
  if (id === 'training_camp') {
    document.getElementById('boost-stat-overlay').classList.remove('hidden');
  } else if (id === 'pr_blitz') {
    S.ownedBoosts[id]--;
    S.Reputation = Math.min(100, (S.Reputation || 0) + 15);
    save();
    showToast('📣 PR Blitz! +15 Reputation');
    renderAll();
  } else if (id === 'second_chance') {
    showToast('🛡️ Second Chance is auto-used when you get fired');
  }
}

function applyTrainingCamp(stat) {
  document.getElementById('boost-stat-overlay').classList.add('hidden');
  const boosts = S.ownedBoosts || {};
  if (!boosts.training_camp || boosts.training_camp <= 0) return;
  boosts.training_camp--;
  S[stat] = Math.min(100, (S[stat] || 0) + 8);
  save();
  showToast('💪 Training Camp: +8 ' + stat);
  renderAll();
}

      return `<div class="stat-locked">

        <div class="stat-key">${k}</div>
        <div class="stat-locked-label">Locked</div>
      </div>`;
    }
    const v = S[k];
    const cls = v >= 70 ? 'hi' : v <= 28 ? 'lo' : '';
    return `<div class="stat-card">
      <div class="stat-num ${cls}">${v}</div>
      <div class="stat-key">${k}</div>
    </div>`;
  }).join('');

  const st = stage();
  const t = f1team();
  const contractStr = S.stageIdx===4 && t
    ? fmtMoney(t.pay)+'/yr'
    : fmtMoney(st.earnings)+'/season';
  const styleIcons = {aggressive:'🔥',technical:'🧠',consistent:'🎯'};
  const styleLabel = S.drivingStyle || 'consistent';

  const carRatingHtml = (S.stageIdx===4 && S.teamCarRating!==null) ? `
    <div style="background:var(--surface);border:1px solid var(--border);padding:12px 14px;margin-top:6px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
        <span style="font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--dim);text-transform:uppercase">Car Rating</span>
        <span style="font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold)">${S.teamCarRating}</span>

  const burnoutHtml = burnout >= 50 ? `
    <div class="burnout-warn">
      <span style="font-size:16px">🔥</span>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:5px">
          <span style="font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--red);text-transform:uppercase">Burnout</span>
          <span style="font-family:'Bebas Neue',sans-serif;font-size:16px;color:var(--red)">${burnout}/100</span>
        </div>
        <div class="burnout-track"><div class="burnout-fill" style="width:${burnout}%"></div></div>
        ${burnout >= 80 ? '<div style="font-family:\'DM Sans\',sans-serif;font-size:10px;font-weight:600;color:var(--red);margin-top:5px;text-transform:uppercase;letter-spacing:1px">⚠ Critical — on the edge</div>' : ''}
      </div>
    </div>` : '';

  document.getElementById('stats-sec').innerHTML = `
    <div class="section-title">Driver Dossier</div>
    <div class="stats-grid">${cards}</div>
    ${carRatingHtml}
    ${burnoutHtml}
    <div class="earn-row">
      <span class="earn-lbl">Career Earnings</span>
      <span class="earn-val">${fmtMoney(S.earnings)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-family:'DM Sans',sans-serif;font-size:10px;color:var(--dim);margin-top:8px;margin-bottom:2px">

      <span>${contractStr}</span>
    </div>
    <div class="career-row">
      <div class="cs"><div class="cs-val">${S.championships}</div><div class="cs-lbl">Titles</div></div>
      <div class="cs"><div class="cs-val">${S.wins}</div><div class="cs-lbl">Wins</div></div>
      <div class="cs"><div class="cs-val">${S.podiums}</div><div class="cs-lbl">Podiums</div></div>
      <div class="cs"><div class="cs-val">${S.seasonsInF1}</div><div class="cs-lbl">F1 Seasons</div></div>

function renderEvents() {
  const total = S.events.length;
  const resolvedCount = S.resolved.length;

  // Show divider between stats and events area
  const divEl = document.getElementById('divider-stats-cal');
  if (divEl) divEl.style.display = '';

  // Calendar strip
  const stageKey = S.stageIdx === 4 ? 'f1' : S.stageIdx >= 1 ? 'feeder' : 'karting';
  const circuits = CIRCUITS[stageKey];
  const currentIdxInCycle = ((S.circuitSeason || 1) - 1) % circuits.length;
  const calStrip = `<div class="calendar-strip">${circuits.map((c,i) => {
    const st = i < currentIdxInCycle ? 'past' : i === currentIdxInCycle ? 'current' : '';
    const weather = c.rain >= 0.35 ? '🌧' : c.rain >= 0.25 ? '🌦' : '☀';
    const label = c.name.length > 9 ? c.name.slice(0,9) + '…' : c.name;
    return `<div class="cal-card ${st}"><div class="cal-name">${label}</div><div class="cal-weather">${weather}</div></div>`;
  }).join('')}</div>`;

  // Unlock notifications
  const pending = S.pendingUnlocks || [];
  const unlockHtml = pending.map(u => `
    <div class="unlock-banner">
      <div class="unlock-banner-head">New stat unlocked</div>
      <div class="unlock-banner-stat">${u.stat}</div>
      <div class="unlock-banner-msg">${u.msg}</div>
    </div>`).join('');
  if (pending.length) { S.pendingUnlocks = []; save(); }

  // Active boosts in inventory
  const boosts = S.ownedBoosts || {};
  const boostHtml = SHOP_BOOSTS
    .filter(b => (boosts[b.id] || 0) > 0)
    .map(b => `<div class="boost-card">
      <div class="boost-card-info">
        <div class="boost-card-name">${b.name} <span style="font-weight:400;color:rgba(255,255,255,.4)">×${boosts[b.id]}</span></div>
        <div class="boost-card-desc">${b.desc}</div>
      </div>
      <button class="boost-use-btn" onclick="useBoost('${b.id}')">USE</button>
    </div>`).join('');

  const dots = S.events.map((ev, i) => {
    const isDone = S.resolved.includes(i);
    const firstUnresolved = S.events.findIndex((_, j) => !S.resolved.includes(j));
    const isActive = !isDone && i === firstUnresolved;
    return `<div class="tinder-dot${isDone?' done':isActive?' active':''}"></div>`;
  }).join('');

  if (resolvedCount >= total) {
    document.getElementById('events-sec').innerHTML = `
      ${calStrip}
      ${unlockHtml}
      ${boostHtml}
      <div class="tinder-wrap">
        <div class="tinder-dots">${dots}</div>
        <div class="tinder-all-done">
          <div class="tinder-all-done-icon">✅</div>
          <div class="tinder-all-done-text">All events resolved — ready to race</div>
        </div>
      </div>`;
    return;
  }

  const ei = S.events.findIndex((_, i) => !S.resolved.includes(i));
  const ev = S.events[ei];

  // Championship decider — show cinematic overlay instead of tinder card
  if (ev.isChampDecider) {
    document.getElementById('events-sec').innerHTML = `${calStrip}${unlockHtml}
      <div class="tinder-wrap"><div class="tinder-dots">${dots}</div>
        <div style="padding:20px 0;text-align:center;font-family:'DM Sans',sans-serif;font-size:12px;color:var(--dim)">
          🏆 Championship Decider — prepare yourself
        </div>
      </div>`;
    showChampDecider(ei);
    return;
  }

  // Outcome flash from last resolved event
  const outcomeHtml = lastEventOutcome && lastEventOutcome.changes.length ? `
    <div class="outcome-flash">
      <div class="outcome-flash-lbl">Last decision</div>
      <div class="outcome-flash-choice">"${esc(lastEventOutcome.choiceText)}"</div>
      ${lastEventOutcome.changes.map(c=>{const key=c.k.toLowerCase()+(c.v>0?'+':'-');const pool=REASONS[key]||[];const reason=pool.length?pool[rnd(0,pool.length-1)]:(lastEventOutcome.reason||'');return`<div class="outcome-stat-line ${c.v>0?'pos':'neg'}"><span class="osv">${c.v>0?'+':''}${c.v} ${c.k.toUpperCase()}</span>${reason?` — ${esc(reason)}`:''}</div>`;}).join('')}
    </div>` : (lastEventOutcome && lastEventOutcome.reason ? `
    <div class="outcome-flash">
      <div class="outcome-flash-lbl">Last decision</div>
      <div class="outcome-flash-choice">"${esc(lastEventOutcome.choiceText)}"</div>
      <div class="outcome-stat-line" style="color:var(--dim);font-size:11px">${esc(lastEventOutcome.reason)}</div>
    </div>` : '');

  const choices = ev.choices.map((c, ci) => {
    const tags = Object.entries(c.fx||{}).filter(([,v])=>v!==0).map(([k,v]) => {
      const cls = v>0?'pos':v<0?'neg':'neu';
      return `<span class="fx-tag ${cls}">${k} ${v>0?'+':''}${v}</span>`;
    });
    if (c.money) tags.push(`<span class="fx-tag pos">+${fmtMoney(c.money)}</span>`);
    if (c.fineByStage) tags.push(`<span class="fx-tag neg">−${fmtMoney(c.fineByStage[S.stageIdx])}</span>`);
    if (c.fiaTone) tags.push(`<span class="fx-tag neu">FIA unhappy</span>`);
    if (c.rollFx) tags.push(`<span class="fx-tag neu">chance of penalty</span>`);
    if (c.safetyCarChoice==='gamble') tags.push(`<span class="fx-tag neu">Big swing</span>`);
    if (c.safetyCarChoice==='safe') tags.push(`<span class="fx-tag pos">Safe gain</span>`);
    if (c.burnoutChange > 0) tags.push(`<span class="fx-tag neg">🔥 +${c.burnoutChange}</span>`);
    if (c.burnoutChange < 0) tags.push(`<span class="fx-tag pos">🔥 ${c.burnoutChange}</span>`);
    return `<button class="tinder-choice" onclick="resolveEvent(${ei},${ci})">
      <div>${esc(c.text)}</div>
      ${tags.length ? `<div class="fx">${tags.join('')}</div>` : ''}
    </button>`;
  }).join('');

  document.getElementById('events-sec').innerHTML = `
    ${calStrip}
    ${unlockHtml}
    ${boostHtml}
    ${outcomeHtml}
    <div class="tinder-wrap">
      <div class="tinder-dots">${dots}</div>
      <div id="tinder-card" class="enter${ev.grave?' grave':''}" data-cat="${ev.cat}">
        <div class="tinder-icon">${ev.icon}</div>
        <div class="tinder-cat">${ev.cat}</div>
        <div class="tinder-title">${esc(ev.title)}</div>
        <div class="tinder-desc">${esc(ev.desc)}</div>
        <div class="tinder-choices">${choices}</div>
      </div>
    </div>`;
}

function updateRaceBtn() {

  btn.disabled = !ready;
  if (sub) sub.textContent = ready
    ? `${stage().label} · Age ${S.age}`
    : `Resolve all events first (${S.resolved.length}/${S.events.length})`;
}

function generateRaceReport(r) {
  const pace = S.Pace, racecraft = S.Racecraft, consistency = S.Consistency;
  const fitness = S.Fitness, morale = S.Morale;
  const rounds = stage().rounds;
  if (morale < 35) return "The psychological weight of the season showed on track. You never fully found your rhythm across the campaign.";
  if (consistency < 50) return "Laptime swings cost you positions at critical moments — sustaining pace across the full distance remained a struggle throughout the season.";
  if (fitness < 40 && rounds >= 16) return "The physical demands of the later rounds exposed your conditioning. You conceded places in the closing stints that should have been yours.";
  if (pace > 75 && racecraft < 45) return "The raw pace was there all season, but converting opportunities proved costly. Two overtakes that should have stuck, didn't.";
  if (consistency > 70 && morale > 60) return "You delivered exactly what the team needed — consistent laptimes and no costly mistakes across the full campaign.";
  if (fitness > 75 && rounds >= 16) return "Your conditioning showed in the closing rounds. You were regularly among the fastest drivers on track when others were fading.";
  if (r.champWon) return "A dominant campaign. Every metric — pace, racecraft, reliability — pointed to a worthy champion.";
  if (r.champPos <= 3) return "A consistent challenger all season. Points accumulated steadily and the paddock began to take notice.";
  if (r.champPos <= Math.ceil(stage().cars / 2)) return "A season of mixed results — flashes of real pace scattered among moments that cost you points.";
  return "A difficult year. The car and the stats tell the same story — more work needed before this level becomes comfortable.";
}

  const inner = document.getElementById('champ-overlay-inner');
  if (!overlay || !inner) return;
  inner.innerHTML = `
    <div class="champ-logo">PitLife · Championship Decider</div>
    <div class="champ-headline">The Title<br>Comes Down<br>To This</div>
    <div class="champ-gap-line" id="champ-typewriter"></div>

      ${ev.choices.map((c,ci)=>`
        <button class="champ-choice-btn" onclick="resolveChampDecider(${ei},${ci})">
          ${esc(c.text)}
          <span class="champ-choice-reason">${esc(c.reason||'')}</span>
        </button>`).join('')}
    </div>`;
  overlay.classList.remove('hidden');
  // Typewriter effect on gap line
  const msg = `${esc(rivalName)} is <span class="champ-rival-name">${gap} points</span> ahead`;

  const tw = document.getElementById('champ-typewriter');

        clearInterval(timer);
        tw.innerHTML = msg; // swap in styled version
      }

    }, 40);

function resolveChampDecider(ei, ci) {
  document.getElementById('champ-overlay').classList.add('hidden');

}

function showChampOutcomeCinematic(finalPos, champPos, choice, callback) {
  const outcome = document.getElementById('champ-outcome');
  const lapText = document.getElementById('champ-lap-text');
  if (!outcome || !lapText) { callback(); return; }

  const won = champPos === 1;
  const dnf = choice === 'engine' && finalPos > 3;
  const p2title = choice === 'safe' && finalPos <= 2;

  const sequence = [
    {text:'RACE DAY', cls:'bright', ms:1400},
    {text:'LAP 1 OF 57\nYou build your pace', cls:'', ms:1600},
    {text:'LAP 30\nThe gap to the leader is closing', cls:'bright', ms:1600},
    {text:'FINAL LAP\nEverything on the line', cls:'bright', ms:2000},
    won
      ? {text:'CHAMPION', cls:'result-win', ms:2500}
      : dnf
        ? {text:'DNF\nThe engine let go\non the last lap', cls:'result-lose', ms:2500}
        : {text:'P2\nYou gave everything\nyou had', cls:'result-p2', ms:2500}
  ];

  outcome.classList.remove('hidden');
  lapText.className = 'champ-lap';
  lapText.style.opacity = '0';
  lapText.textContent = '';

  let idx = 0;
  function showNext() {
    if (idx >= sequence.length) {
      outcome.classList.add('hidden');
      callback();
      return;
    }
    const s = sequence[idx++];
    lapText.className = 'champ-lap ' + (s.cls || '');
    lapText.style.whiteSpace = 'pre-line';
    lapText.textContent = s.text;
    lapText.style.opacity = '0';
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { lapText.style.opacity = '1'; });
    });
    setTimeout(() => {
      lapText.style.opacity = '0';
      setTimeout(showNext, 600);
    }, s.ms);
  }
  showNext();
}

function effectiveNickname() {
  return (S.customNickname && S.customNickname.trim()) ? S.customNickname.trim() : S.nickname;
}

function pickHeadline(r) {
  if (r.wasRain) {
    if (r.champPos === 1) return ['A masterclass in the wet!','Rain master claims the title','Brilliant through the spray'][rnd(0,2)];
    if (r.champPos <= 3)  return ['Stellar wet-weather drive','Cool head in chaotic conditions','Composed through the spray'][rnd(0,2)];
  }
  if (r.circuitName === 'Monaco Royale') {
    if (r.champPos === 1) return ['Monaco Royale champion — the streets belonged to them!','The king of the streets!'][rnd(0,1)];
    if (r.champPos <= 3)  return ['A Monaco podium for the ages','Street fighter shows their class'][rnd(0,1)];
  }
  if (r.circuitName === 'Home Grand Prix') {
    if (r.champPos === 1) return ['Home hero! The crowd goes wild!','The home faithful roar their champion home'][rnd(0,1)];
    if (r.champPos <= 3)  return ['Home podium delights the crowd','Local hero delivers on the big stage'][rnd(0,1)];
  }
  if (r.champWon)       return ['Championship glory at last!','Dominant title campaign','The title is theirs!'][rnd(0,2)];
  if (r.champPos <= 3)  return ['Championship podium — the future is bright','Strong season raises expectations','Closing in on the top'][rnd(0,2)];
  if (r.fired)          return ['A difficult year raises hard questions','Under pressure from all sides','The comeback starts now'][rnd(0,2)];
  if (r.avgPos <= 5)    return ['Impressive pace earns paddock respect','Fast but fortune wasn\'t kind','A season of what-ifs'][rnd(0,2)];
  return ['Experience gained on the road to glory','Character-building campaign','The journey continues'][rnd(0,2)];
}

function calcRating() {
  const sc = S.championships*30 + S.wins*5 + S.podiums*2 + S.seasonsInF1*3;
  if (sc>=200) return {grade:'S', label:'All-time Legend'};
  if (sc>=120) return {grade:'A', label:'Championship Contender'};
  if (sc>=60)  return {grade:'B', label:'Solid F1 Career'};
  if (sc>=25)  return {grade:'C', label:'Journeyman Pro'};
  if (sc>=8)   return {grade:'D', label:'Nearly Made It'};
  return          {grade:'F', label:'Back to Karting'};
}

function calcLegacyTitle() {
  if (S.championships >= 3 && S.wins >= 20) return {title:'Motorsport Icon', desc:'Three titles. Decades of brilliance. Your name belongs in the pantheon.'};
  if (S.championships >= 2) return {title:'Double Champion', desc:'More than once, you conquered the grid. Your legacy is undeniable.'};
  if (S.championships === 1 && S.wins >= 10) return {title:'World Champion', desc:'You reached the summit. Only a handful ever do.'};
  if (S.championships === 1) return {title:'Champion', desc:'Once, the championship was yours. Not everyone gets that moment.'};
  if (S.seasonsInF1 >= 5 && S.podiums >= 10) return {title:'F1 Veteran', desc:'Years in the top flight, countless battles. A respected name in the paddock.'};
  if (S.seasonsInF1 >= 3) return {title:'F1 Racer', desc:'You made it to the pinnacle and competed at the highest level.'};
  if (S.wins >= 5) return {title:'Race Winner', desc:'You stood on the top step. Speed was never your problem.'};
  if (S.podiums >= 3) return {title:'Podium Finisher', desc:'You mixed it with the best and came away with silverware.'};
  if (S.burnoutRetired) return {title:'Burnt Out', desc:"The sport took everything you had. There's no shame in that."};
  return {title:'Journeyman', desc:'You gave everything the sport demanded. Most never make it this far.'};
}

function calcAchievements() {
  const ach = [];
  if (S.championships >= 1) ach.push({icon:'🏆', name:'World Champion', desc:'Won a championship title'});
  if (S.championships >= 3) ach.push({icon:'👑', name:'Dynasty', desc:'Three or more titles'});
  if (S.wins >= 1)  ach.push({icon:'🥇', name:'Race Winner', desc:'Stood on the top step'});
  if (S.wins >= 10) ach.push({icon:'🔟', name:'Ten Wins', desc:'10 race victories'});
  if (S.wins >= 25) ach.push({icon:'🌟', name:'25 Wins', desc:'An all-time great record'});
  if (S.podiums >= 10) ach.push({icon:'🥈', name:'Podium Regular', desc:'10 or more podiums'});
  if (S.seasonsInF1 >= 10) ach.push({icon:'🎖️', name:'F1 Lifer', desc:'10 seasons in Formula 1'});
  if ((S.monacoSeasonWins||0) >= 2) ach.push({icon:'🎰', name:'Monaco Master', desc:'Won at Monaco Royale twice'});
  if ((S.homeSeasonWins||0) >= 1) ach.push({icon:'🏠', name:'Home Hero', desc:'Won the Home Grand Prix'});
  if ((S.runnerUpCount||0) >= 3) ach.push({icon:'😤', name:'The Nearly Man', desc:'Runner-up in championship three times'});
  if ((S.sameTeamSeasons||0) >= 4) ach.push({icon:'🤝', name:'Loyal', desc:'4+ seasons with the same F1 team'});
  if (S.recoveredToF1) ach.push({icon:'💪', name:'Comeback', desc:'Returned to F1 after being dropped'});
  if ((S.incidentCount||0) >= 5) ach.push({icon:'💥', name:'Incident Prone', desc:'5 or more on-track incidents'});
  if (S.burnoutRetired) ach.push({icon:'🔥', name:'Burned Out', desc:'Career ended by total burnout'});
  if (S.earnings >= 50000000) ach.push({icon:'💰', name:'Fifty Million', desc:'£50M+ career earnings'});
  if (ach.length === 0 && S.seasonsInF1 >= 1) ach.push({icon:'🏎️', name:'F1 Driver', desc:'Made it to Formula 1'});
  return ach;
}

function restartGame() {
  clearSave();
  S = null;
  selectedNat = null;
  selectedStyle = 'consistent';
  activeTab = 'season';
  document.getElementById('screen-gameover').style.display = 'none';
  document.getElementById('screen-manager').style.display = 'none';
  document.getElementById('retire-choice-overlay').classList.add('hidden');
  showScreen('start');
  // Reset step flow
  for (let i = 0; i < 4; i++) {
    const p = document.getElementById('step-'+i);
    if (p) { p.classList.toggle('hidden', i !== 0); p.style.opacity = ''; p.style.transition = ''; }
  }
  currentStep = 0;
  updateDots(0);
  // Reset name
  const nameEl = document.getElementById('driver-name');
  if (nameEl) nameEl.value = '';
  const continueBtn = document.getElementById('name-continue-btn');
  if (continueBtn) continueBtn.classList.add('hidden');
  // Reset nat
  const natFlag = document.getElementById('nat-flag-display');
  const natInput = document.getElementById('nat-search');
  if (natFlag) natFlag.textContent = '🌍';
  if (natInput) { natInput.value = ''; natInput.setAttribute('readonly',''); }
  closeNatDropdown();
  // Reset style
  document.querySelectorAll('.style-btn').forEach(b=>b.classList.toggle('sel', b.dataset.style==='consistent'));
  initHelmetCreator();
}

// DAILY CHALLENGE

function getDailyKey() {
  const d = new Date();
  return `pitlife_daily_${d.getFullYear()}_${d.getMonth()}_${d.getDate()}`;
}
function getDailySeed() {
  const d = new Date();
  return d.getFullYear() * 10000 + (d.getMonth()+1) * 100 + d.getDate();
}
function seededRand(seed) {
  const x = Math.sin(seed + 1) * 10000;
  return x - Math.floor(x);
}
function getHoursUntilMidnight() {
  const now = new Date();
  const tomorrow = new Date(now);
  tomorrow.setDate(tomorrow.getDate()+1);
  tomorrow.setHours(0,0,0,0);
  const diff = tomorrow - now;
  const h = Math.floor(diff / 3600000);
  const m = Math.floor((diff % 3600000) / 60000);
  return `${h}h ${m}m`;
}
function openDailyChallenge() {
  const modal = document.getElementById('daily-modal');
  const content = document.getElementById('daily-content');
  const countdown = document.getElementById('daily-countdown');
  const key = getDailyKey();
  const seed = getDailySeed();
  const done = JSON.parse(localStorage.getItem(key) || 'null');

  countdown.textContent = `Resets in ${getHoursUntilMidnight()}`;

  // Pick today's event deterministically using seed
  const eventIdx = Math.floor(seededRand(seed * 31) * EVENTS.length);
  const ev = EVENTS[Math.min(eventIdx, EVENTS.length - 1)];

  if (done !== null) {
    // Already completed — show result
    const choiceData = ev.choices[done.choice] || ev.choices[0];
    const fx = choiceData.fx || {};
    const fxStr = Object.entries(fx).map(([k,v]) => `${v>0?'+':''}${v} ${k}`).join(' · ') || 'No stat change';
    const reason = choiceData.reason || '';
    content.innerHTML = `
      <div style="font-size:28px;text-align:center;margin-bottom:8px">${ev.icon}</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:4px">${ev.cat}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text);margin-bottom:8px">${esc(ev.title)}</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:13px;color:var(--dim);margin-bottom:12px;line-height:1.55">${esc(ev.desc)}</div>
      <div class="daily-result-box">
        <div class="daily-done-lbl">Your Choice</div>
        <div class="daily-done-text" style="font-style:italic;margin-bottom:8px">"${esc(choiceData.text)}"</div>
        ${reason ? `<div class="daily-done-lbl" style="margin-top:6px">Result</div><div class="daily-done-text">${esc(reason)}</div>` : ''}
        <div class="daily-done-lbl" style="margin-top:8px">Stat Impact</div>
        <div class="daily-done-text" style="font-family:'Bebas Neue',sans-serif;font-size:14px">${esc(fxStr)}</div>
      </div>
      <div style="font-family:'DM Sans',sans-serif;font-size:11px;color:var(--dim);text-align:center">Come back tomorrow for a new challenge</div>`;
  } else {
    // Show the challenge
    const choices = ev.choices.slice(0,2).map((c,i) => `
      <button class="tinder-choice" onclick="submitDailyChoice(${i})"
        style="margin-bottom:8px;width:100%;display:block;text-align:left;padding:12px 14px">
        ${esc(c.text)}
      </button>`).join('');
    content.innerHTML = `
      <div style="font-size:32px;text-align:center;margin-bottom:8px">${ev.icon}</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:9px;font-weight:700;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:4px">${ev.cat}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:var(--text);margin-bottom:8px">${esc(ev.title)}</div>
      <div style="font-family:'DM Sans',sans-serif;font-size:13px;color:var(--dim);margin-bottom:16px;line-height:1.55">${esc(ev.desc)}</div>
      <div>${choices}</div>`;
  }

  modal.classList.remove('hidden');
}
function submitDailyChoice(choiceIdx) {
  const key = getDailyKey();
  localStorage.setItem(key, JSON.stringify({choice: choiceIdx, ts: Date.now()}));
  openDailyChallenge(); // Re-render with result view
}
function closeDailyChallenge() {
  document.getElementById('daily-modal').classList.add('hidden');
}

// ══════════════════════════════════════════════
// SHARE CAREER CARD
// ══════════════════════════════════════════════
function showCareerShareCard() {
  const legacy = calcLegacyTitle();
  const rating = calcRating();
  document.getElementById('sc-driver-name').textContent = S.name || 'Driver';
  document.getElementById('sc-legacy-text').textContent = legacy.title;
  document.getElementById('sc-rating-grade').textContent = rating.grade;
  document.getElementById('sc-rating-label').textContent = rating.label;
  const stats = [
    {v: S.championships || 0, l:'Titles'},
    {v: S.wins || 0,          l:'Wins'},
    {v: S.podiums || 0,       l:'Podiums'},
    {v: S.seasonsInF1 || 0,   l:'F1 Seasons'},
    {v: S.log.length,         l:'Seasons'},
    {v: fmtMoney(S.earnings), l:'Earnings'}
  ];
  document.getElementById('sc-stats-grid').innerHTML = stats.map(s => `
    <div class="sc-stat">
      <div class="sc-stat-val">${esc(String(s.v))}</div>
      <div class="sc-stat-lbl">${s.l}</div>
    </div>`).join('');
  document.getElementById('share-card-overlay').classList.remove('hidden');
}
async function doShareCard() {
  const legacy = calcLegacyTitle();
  const rating = calcRating();
  const text = `🏎 PitLife Career\n${S.name} — ${legacy.title}\n🏆 ${S.championships||0} titles · ${S.wins||0} wins · ${S.podiums||0} podiums\nCareer Rating: ${rating.grade} — ${rating.label}\n\nPlay at pitlife.vercel.app`;
  if (navigator.share) {
    try {
      await navigator.share({
        title: `PitLife — ${S.name}`,
        text,
        url: 'https://pitlife.vercel.app'
      });
      return;
    } catch(e) { /* user cancelled or not supported */ }
  }
  // Fallback: clipboard
  try {
    await navigator.clipboard.writeText(text);
    alert('Career stats copied to clipboard!');
  } catch(e) {
    alert(`Share your career:\n\n${text}`);
  }
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  buildNatGrid();
  initHelmetCreator();
  // Close nat dropdown on outside click
  document.addEventListener('click', e => {
    if (!e.target.closest('#nat-dropdown')) closeNatDropdown();
  });

  if (load() && S) {
    // Daily login bonus
    const today = new Date().toDateString();
    if ((S.lastLoginDate || '') !== today) {
      S.pitcoins = (S.pitcoins || 0) + 20;
      S.lastLoginDate = today;
      save();
      setTimeout(() => showToast('🪙 Daily bonus: +20 PitCoins!', 3000), 800);
    }
    if (S._mgrActive) {
      showScreen('manager');
      renderManagerScreen();
    } else if (S.gameOver) {
      showScreen('gameover');
      renderGameOver();
    } else {
      showScreen('game');
      renderAll();
    }
  } else {
    showScreen('start');
  }
});
</script>
