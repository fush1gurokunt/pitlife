<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PitLife — F1 Career Simulator</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #050508;
  --bg2:      #0d0d14;
  --bg3:      #15151e;
  --border:   #26263a;
  --red:      #e8000a;
  --red-dark: #b50008;
  --gold:     #f5a623;
  --green:    #22c55e;
  --text:     #f0f0f5;
  --dim:      #7878a0;
  --head:     'Barlow Condensed', sans-serif;
  --body:     'Barlow', sans-serif;
  --r:        10px;
  --rs:       6px;
}
*{box-sizing:border-box;margin:0;padding:0;user-select:none;-webkit-user-select:none}
html{background:var(--bg)}
body{
  background:var(--bg);
  color:var(--text);
  font-family:'Barlow',sans-serif;
  min-height:100dvh;
  display:flex;
  flex-direction:column;
  align-items:center;
}

/* ─── SCREENS ─── */
.screen{width:100%;max-width:480px}
.screen.hidden{display:none!important}

/* ─── START ─── */
#screen-start{
  padding:40px 16px 60px;
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:24px;
}
.logo-icon{font-size:52px;text-align:center;line-height:1}
.logo-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:52px;font-weight:900;
  letter-spacing:3px;color:var(--red);
  text-transform:uppercase;text-align:center;
}
.logo-sub{
  color:var(--dim);font-size:13px;
  letter-spacing:2px;text-transform:uppercase;
  text-align:center;margin-top:2px;
}
.form{width:100%;display:flex;flex-direction:column;gap:18px}
.flabel{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;
  letter-spacing:2px;color:var(--dim);
  text-transform:uppercase;margin-bottom:7px;display:block;
}
.finput{
  width:100%;background:var(--bg3);
  border:1.5px solid var(--border);border-radius:var(--rs);
  color:var(--text);font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:700;
  padding:12px 14px;outline:none;
  transition:border-color .15s;
}
.finput:focus{border-color:var(--red)}
.nat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:5px}
.nat-btn{
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:var(--rs);cursor:pointer;
  font-size:20px;padding:7px 2px;
  text-align:center;transition:border-color .15s,background .15s;
  position:relative;
}
.nat-btn:hover{border-color:#555}
.nat-btn.sel{border-color:var(--red);background:rgba(232,0,10,.12)}
.nat-tip{
  display:none;position:absolute;
  bottom:calc(100% + 4px);left:50%;
  transform:translateX(-50%);
  background:#222;color:#fff;
  font-size:10px;padding:2px 7px;
  border-radius:4px;white-space:nowrap;
  pointer-events:none;z-index:10;
  font-family:'Barlow',sans-serif;
}
.nat-btn:hover .nat-tip{display:block}
.btn-primary{
  background:var(--red);border:none;border-radius:var(--rs);
  color:#fff;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;
  font-size:19px;font-weight:700;
  letter-spacing:1.5px;padding:14px;
  text-transform:uppercase;width:100%;
  transition:background .15s,transform .1s;
}
.btn-primary:hover:not(:disabled){background:var(--red-dark)}
.btn-primary:active:not(:disabled){transform:scale(.98)}
.btn-primary:disabled{background:#1c1c28;color:#444;cursor:not-allowed}

/* ─── GAME SCREEN ─── */
#screen-game{display:flex;flex-direction:column;align-items:center}
#game-header{
  position:sticky;top:0;
  background:var(--bg);
  border-bottom:1px solid var(--border);
  padding:10px 16px;z-index:100;
  width:100%;max-width:480px;
}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.hdr-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:21px;font-weight:700;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.hdr-team{font-size:12px;color:var(--dim);margin-top:2px}
.hdr-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.hdr-age{font-family:'Barlow Condensed',sans-serif;font-size:13px;color:var(--dim)}
.stage-pill{
  background:var(--red);border-radius:20px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:1px;
  padding:3px 10px;text-transform:uppercase;white-space:nowrap;
}
.wrap{width:100%;max-width:480px;padding:0 16px 110px}
.section-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;
  letter-spacing:2.5px;color:var(--dim);
  text-transform:uppercase;margin:20px 0 10px;
}

/* ─── STATS ─── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.stat-bar{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--rs);padding:8px 10px;
}
.stat-lbl{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.stat-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:1px;color:var(--dim);text-transform:uppercase;
}
.stat-val{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;font-weight:700;
}
.stat-track{background:var(--bg);border-radius:3px;height:4px;overflow:hidden}
.stat-fill{background:var(--red);border-radius:3px;height:100%;transition:width .4s ease}
.stat-fill.hi{background:var(--green)}
.stat-fill.md{background:var(--gold)}
.earn-row{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);
  padding:10px 12px;display:flex;justify-content:space-between;align-items:center;margin-top:7px;
}
.earn-lbl{
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;
  letter-spacing:1.5px;color:var(--dim);text-transform:uppercase;
}
.earn-val{
  font-family:'Barlow Condensed',sans-serif;
  font-size:21px;font-weight:700;color:var(--gold);
}
.career-row{display:grid;grid-template-columns:repeat(4,1fr);gap:7px;margin-top:7px}
.cs{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--rs);padding:8px 4px;text-align:center;
}
.cs-val{
  font-family:'Barlow Condensed',sans-serif;
  font-size:22px;font-weight:900;
}
.cs-lbl{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}

/* ─── EVENT CARDS ─── */
.events-list{display:flex;flex-direction:column;gap:10px}
.ev-card{
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:var(--r);overflow:hidden;transition:opacity .3s;
}
.ev-card.resolved{opacity:.4;pointer-events:none}
.ev-head{display:flex;align-items:flex-start;gap:10px;padding:12px 14px 6px}
.ev-icon{font-size:22px;flex-shrink:0;margin-top:1px}
.ev-cat{
  font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;
  letter-spacing:1.5px;color:var(--red);text-transform:uppercase;
}
.ev-title{
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;font-weight:700;line-height:1.2;margin-top:1px;
}
.ev-desc{font-size:13px;color:var(--dim);line-height:1.5;padding:0 14px 10px}
.ev-choices{display:flex;flex-direction:column;gap:6px;padding:0 10px 10px}
.choice-btn{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--rs);color:var(--text);
  cursor:pointer;font-family:'Barlow',sans-serif;
  font-size:13px;padding:8px 10px;
  text-align:left;width:100%;
  transition:border-color .15s,background .15s;
}
.choice-btn:hover{border-color:var(--red);background:rgba(232,0,10,.08)}
.fx{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.fx-tag{
  border-radius:4px;font-family:'Barlow Condensed',sans-serif;
  font-size:10px;font-weight:700;letter-spacing:.5px;padding:1px 5px;
}
.fx-tag.pos{background:rgba(34,197,94,.15);color:var(--green)}
.fx-tag.neg{background:rgba(232,0,10,.15);color:#ff6060}
.fx-tag.neu{background:rgba(255,255,255,.08);color:var(--dim)}

/* ─── SEASON LOG ─── */
.log-list{display:flex;flex-direction:column;gap:6px}
.log-entry{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--rs);padding:9px 12px;
}
.log-h{display:flex;justify-content:space-between;align-items:center}
.log-stage{
  font-family:'Barlow Condensed',sans-serif;
  font-size:13px;font-weight:700;color:var(--red);
}
.log-pos{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700}
.log-pos.gold{color:var(--gold)}
.log-pos.silver{color:#b0b0c0}
.log-detail{font-size:12px;color:var(--dim);margin-top:2px}

/* ─── BOTTOM BAR ─── */
#bottom-bar{
  position:fixed;bottom:0;left:50%;
  transform:translateX(-50%);
  width:100%;max-width:480px;
  background:linear-gradient(to top,var(--bg) 75%,transparent);
  padding:16px 16px 22px;z-index:99;
}
#race-btn{
  background:var(--red);border:none;border-radius:var(--rs);
  color:#fff;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;
  font-size:21px;font-weight:700;letter-spacing:2px;
  padding:15px;text-transform:uppercase;width:100%;
  transition:background .15s,transform .1s;
}
#race-btn:hover:not(:disabled){background:var(--red-dark)}
#race-btn:active:not(:disabled){transform:scale(.98)}
#race-btn:disabled{background:#14141e;color:#3a3a50;cursor:not-allowed}
#race-btn .sub{display:block;font-size:11px;font-weight:400;letter-spacing:1px;opacity:.65;margin-top:2px}

/* ─── RESULTS OVERLAY ─── */
#results-overlay{
  position:fixed;inset:0;
  background:rgba(5,5,8,.88);
  backdrop-filter:blur(4px);
  z-index:200;display:flex;
  flex-direction:column;align-items:center;
  justify-content:flex-end;padding:16px;
}
#results-overlay.hidden{display:none!important}
.res-card{
  background:var(--bg2);border:1.5px solid var(--border);
  border-radius:var(--r);width:100%;max-width:448px;
  padding:20px;
  animation:slideUp .35s cubic-bezier(.34,1.56,.64,1);
  max-height:88vh;overflow-y:auto;
}
@keyframes slideUp{
  from{transform:translateY(100%);opacity:0}
  to{transform:translateY(0);opacity:1}
}
.res-season{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;letter-spacing:2px;
  color:var(--red);text-transform:uppercase;margin-bottom:4px;
}
.res-pos{
  font-family:'Barlow Condensed',sans-serif;
  font-size:72px;font-weight:900;line-height:1;
}
.res-pos.gold{color:var(--gold)}
.res-pos.silver{color:#b0b0c0}
.res-sublabel{
  font-family:'Barlow Condensed',sans-serif;
  font-size:15px;color:var(--dim);margin-bottom:14px;
}
.res-headline{
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;font-weight:700;line-height:1.3;
  border-left:3px solid var(--red);padding-left:10px;margin-bottom:14px;
}
.deltas-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:14px}
.delta{
  background:var(--bg3);border-radius:var(--rs);
  padding:6px 10px;display:flex;justify-content:space-between;align-items:center;
}
.delta-n{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.delta-v{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700}
.delta-v.pos{color:var(--green)}
.delta-v.neg{color:#ff6060}
.delta-v.neu{color:var(--dim)}
.earn-banner{
  background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.3);
  border-radius:var(--rs);padding:9px 13px;
  display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;
}
.earn-b-lbl{font-family:'Barlow Condensed',sans-serif;font-size:12px;color:var(--gold);text-transform:uppercase;letter-spacing:1px}
.earn-b-val{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;color:var(--gold)}
.champ-banner{
  background:linear-gradient(135deg,rgba(245,166,35,.18),rgba(232,0,10,.15));
  border:1.5px solid var(--gold);border-radius:var(--rs);
  padding:12px 14px;text-align:center;margin-bottom:14px;
}
.champ-banner .trophy{font-size:30px}
.champ-banner h3{
  font-family:'Barlow Condensed',sans-serif;
  font-size:20px;font-weight:900;color:var(--gold);
  text-transform:uppercase;letter-spacing:1px;
}
.move-banner{
  border-radius:var(--rs);padding:9px 13px;
  text-align:center;margin-bottom:14px;
  font-family:'Barlow Condensed',sans-serif;
  font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:1px;
}
.move-banner.up{background:rgba(34,197,94,.1);border:1.5px solid var(--green);color:var(--green)}
.move-banner.down{background:rgba(232,0,10,.1);border:1.5px solid var(--red);color:#ff6060}
.standings{width:100%;border-collapse:collapse;margin-bottom:14px}
.standings th{
  font-family:'Barlow Condensed',sans-serif;font-size:10px;
  font-weight:700;letter-spacing:1.5px;color:var(--dim);
  text-transform:uppercase;text-align:left;
  padding:4px 8px;border-bottom:1px solid var(--border);
}
.standings td{
  font-family:'Barlow Condensed',sans-serif;font-size:14px;
  padding:6px 8px;border-bottom:1px solid rgba(255,255,255,.04);
}
.standings tr.me td{color:var(--red);font-weight:700}
.standings td.pts{text-align:right;font-weight:700}
.btn-continue{
  background:var(--red);border:none;border-radius:var(--rs);
  color:#fff;cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;
  font-size:17px;font-weight:700;letter-spacing:1.5px;
  padding:13px;text-transform:uppercase;width:100%;
  transition:background .15s;margin-top:4px;
}
.btn-continue:hover{background:var(--red-dark)}

/* ─── GAME OVER ─── */
#screen-gameover{
  width:100%;max-width:480px;
  padding:40px 16px 60px;
  display:none;flex-direction:column;align-items:center;gap:18px;
}
.go-title{text-align:center}
.go-title h1{
  font-family:'Barlow Condensed',sans-serif;
  font-size:42px;font-weight:900;color:var(--red);
  text-transform:uppercase;letter-spacing:2px;
}
.go-title p{font-size:13px;color:var(--dim);margin-top:4px}
.rating-box{
  background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);
  padding:16px;width:100%;text-align:center;
}
.rating-box .grade{
  font-family:'Barlow Condensed',sans-serif;
  font-size:52px;font-weight:900;color:var(--gold);
}
.rating-box .grade-lbl{font-size:13px;color:var(--dim);margin-top:2px}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;width:100%}
.sum-stat{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:var(--rs);padding:14px 10px;text-align:center;
}
.sum-v{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900}
.sum-v.gold{color:var(--gold)}
.sum-l{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:3px}

/* ─── MISC ─── */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:#2a2a40;border-radius:2px}
.hidden{display:none!important}

/* ─── TAB BAR ─── */
.tab-bar{display:flex;gap:6px;padding:8px 0 2px}
.tab-pill{
  background:var(--bg3);border:1.5px solid var(--border);border-radius:20px;
  color:var(--dim);cursor:pointer;
  font-family:'Barlow Condensed',sans-serif;
  font-size:12px;font-weight:700;letter-spacing:1px;
  padding:5px 14px;text-transform:uppercase;
  transition:border-color .15s,color .15s,background .15s;
}
.tab-pill.active{background:var(--red);border-color:var(--red);color:#fff}

/* ─── MY CAR ─── */
.helmet-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:8px;margin-top:4px}
.helmet-swatch{
  aspect-ratio:1;border-radius:50%;
  border:2.5px solid var(--border);cursor:pointer;
  transition:border-color .15s,transform .1s;
}
.helmet-swatch:hover{transform:scale(1.1)}
.helmet-swatch.sel{border-color:var(--text);border-width:3px}
.car-input{font-size:18px;padding:10px 14px}
.livery-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
.livery-btn{
  background:var(--bg3);border:1.5px solid var(--border);
  border-radius:var(--rs);cursor:pointer;
  padding:0 0 8px;overflow:hidden;
  transition:border-color .15s;text-align:center;
}
.livery-btn:hover{border-color:#555}
.livery-btn.sel{border-color:var(--red)}
.livery-preview{height:48px;width:100%;margin-bottom:6px}
.livery-name{
  font-family:'Barlow Condensed',sans-serif;
  font-size:11px;font-weight:700;
  letter-spacing:1px;color:var(--text);text-transform:uppercase;
}

/* ─── GRAVE EVENT ─── */
.ev-card.grave{border-color:#444}
.ev-card.grave .ev-cat{color:var(--dim)}
.ev-card.grave .ev-icon{filter:grayscale(1)}

/* ─── HOME BUTTON ─── */
.btn-home{background:none;border:none;cursor:pointer;color:var(--dim);font-size:18px;padding:4px 6px;border-radius:var(--rs);transition:color .15s,background .15s;flex-shrink:0;line-height:1}
.btn-home:hover{background:rgba(255,255,255,.07);color:var(--text)}

/* ─── TIER GLOW ─── */
#game-header{transition:border-bottom-color .4s,box-shadow .4s}
#game-header.tier-top{border-bottom-color:rgba(232,0,10,.4);box-shadow:0 2px 18px -4px rgba(232,0,10,.45)}
#game-header.tier-mid{border-bottom-color:rgba(245,166,35,.35);box-shadow:0 2px 18px -4px rgba(245,166,35,.38)}
#game-header.tier-back{border-bottom-color:rgba(120,120,160,.3);box-shadow:0 2px 10px -4px rgba(120,120,160,.2)}

/* ─── TAB FADE ─── */
.tab-content{animation:tabFadeIn .2s ease both}
@keyframes tabFadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ─── TINDER CARDS ─── */
.tinder-wrap{display:flex;flex-direction:column;align-items:center;padding:8px 0 16px}
.tinder-dots{display:flex;gap:7px;margin-bottom:16px}
.tinder-dot{width:8px;height:8px;border-radius:50%;background:var(--border);transition:background .2s}
.tinder-dot.done{background:var(--green)}
.tinder-dot.active{background:var(--red)}
#tinder-card{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--r);width:100%;padding:24px 20px 18px;transition:opacity .25s,transform .25s;opacity:1;transform:none}
#tinder-card.exit{opacity:0;transform:translateY(-14px);pointer-events:none}
#tinder-card.enter{animation:cardEnter .25s ease both}
#tinder-card.grave{border-color:#444}
#tinder-card.grave .tinder-cat{color:var(--dim)}
@keyframes cardEnter{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
.tinder-icon{font-size:44px;text-align:center;margin-bottom:10px;line-height:1}
.tinder-cat{font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--red);text-transform:uppercase;text-align:center;margin-bottom:4px}
.tinder-title{font-family:'Barlow Condensed',sans-serif;font-size:23px;font-weight:700;line-height:1.2;text-align:center;margin-bottom:10px}
.tinder-desc{font-size:13.5px;color:var(--dim);line-height:1.55;text-align:center;margin-bottom:18px}
.tinder-choices{display:flex;flex-direction:column;gap:8px}
.tinder-choice{background:var(--bg2);border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);cursor:pointer;font-family:'Barlow',sans-serif;font-size:13px;padding:10px 12px;text-align:left;width:100%;transition:border-color .15s,background .15s,transform .1s}
.tinder-choice:hover{border-color:var(--red);background:rgba(232,0,10,.08)}
.tinder-choice:active{transform:scale(.98)}
.tinder-all-done{text-align:center;padding:20px 0 8px;width:100%}
.tinder-all-done-icon{font-size:36px;margin-bottom:8px}
.tinder-all-done-text{font-family:'Barlow Condensed',sans-serif;font-size:15px;color:var(--dim);letter-spacing:.5px}

/* ─── LEAGUE TABLE ─── */
.league-row{display:grid;grid-template-columns:24px 22px 1fr 52px 38px;align-items:center;gap:6px;padding:9px 10px;border-bottom:1px solid rgba(255,255,255,.04);opacity:0;transform:translateY(8px);transition:opacity .3s,transform .3s}
.league-row.visible{opacity:1;transform:none}
.league-row:last-child{border-bottom:none}
.league-row.me-row .lg-name{color:var(--red);font-weight:700}
.lg-pos{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700;color:var(--dim);text-align:center}
.lg-pos.p1{color:var(--gold)}
.lg-flag{font-size:15px;text-align:center}
.lg-info{min-width:0}
.lg-name{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.lg-team{font-size:10px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.lg-pts{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;text-align:right;white-space:nowrap}
.lg-gap{font-size:10px;color:var(--dim);text-align:right;margin-top:1px}
.lg-form{display:flex;gap:3px;justify-content:flex-end;align-items:center}
.form-dot{width:7px;height:7px;border-radius:50%;background:var(--border)}
.form-dot.pod{background:var(--gold)}
.form-dot.pts{background:var(--green)}

/* ─── DRIVING STYLE ─── */
.style-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:4px}
.style-btn{background:var(--bg3);border:1.5px solid var(--border);border-radius:var(--rs);cursor:pointer;padding:12px 6px 10px;text-align:center;transition:border-color .15s,background .15s;width:100%}
.style-btn:hover{border-color:#555}
.style-btn.sel{border-color:var(--red);background:rgba(232,0,10,.12)}
.style-icon{font-size:24px;margin-bottom:4px;line-height:1}
.style-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:.5px}
.style-desc{font-size:10px;color:var(--dim);margin-top:3px;line-height:1.3}

/* ─── CIRCUIT BADGE ─── */
.circuit-badge{font-size:11px;color:var(--dim);margin-top:2px}
.circuit-badge .rain-tag{color:#60a0ff;margin-left:4px}

/* ─── SPONSOR TRACKER ─── */
.sponsor-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 12px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px}
.sponsor-name{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700}
.sponsor-cond{font-size:11px;color:var(--dim);margin-top:2px;line-height:1.3}
.sponsor-badge{font-family:'Barlow Condensed',sans-serif;font-size:12px;font-weight:700;white-space:nowrap;margin-left:10px;flex-shrink:0}
.sponsor-badge.pass{color:var(--green)}
.sponsor-badge.fail{color:#ff6060}

/* ─── CAR RATING ─── */
.car-rating-wrap{display:flex;align-items:center;gap:8px;margin-top:3px}
.car-rating-track{flex:1;height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
.car-rating-fill{height:100%;border-radius:2px;background:var(--gold);transition:width .4s ease}
.car-rating-val{font-family:'Barlow Condensed',sans-serif;font-size:11px;color:var(--gold);font-weight:700;min-width:24px;text-align:right}

/* ─── TIER DOT ─── */
.tier-dot{width:6px;height:6px;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle;flex-shrink:0}
.tier-dot.t1{background:var(--red)}
.tier-dot.t2{background:var(--gold)}
.tier-dot.t3{background:var(--dim)}

/* ─── VETERAN BADGE ─── */
.veteran-badge{background:rgba(245,166,35,.15);border:1px solid rgba(245,166,35,.3);border-radius:4px;font-family:'Barlow Condensed',sans-serif;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--gold);padding:1px 7px;text-transform:uppercase;white-space:nowrap}

/* ─── BURNOUT ─── */
.burnout-warn{display:flex;align-items:center;gap:8px;background:rgba(220,60,0,.12);border:1px solid rgba(220,60,0,.28);border-radius:var(--rs);padding:8px 10px;margin-top:7px}
.burnout-track{flex:1;height:3px;background:var(--bg);border-radius:2px;overflow:hidden}
.burnout-fill{height:100%;border-radius:2px;background:linear-gradient(to right,var(--gold),#ff4400);transition:width .4s ease}

/* ─── LEGACY / ACHIEVEMENTS ─── */
.legacy-box{background:rgba(245,166,35,.08);border:1.5px solid rgba(245,166,35,.4);border-radius:var(--r);padding:16px;text-align:center;width:100%}
.legacy-title{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:900;color:var(--gold);letter-spacing:1px;text-transform:uppercase}
.legacy-sub{font-size:12px;color:var(--dim);margin-top:5px;line-height:1.45}
.achievements-grid{display:flex;flex-direction:column;gap:6px;width:100%}
.achievement{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:9px 12px;display:flex;align-items:center;gap:10px}
.ach-icon{font-size:20px;flex-shrink:0}
.ach-name{font-family:'Barlow Condensed',sans-serif;font-size:14px;font-weight:700}
.ach-desc{font-size:11px;color:var(--dim);margin-top:1px}
</style>
</head>

// HELPERS
// ══════════════════════════════════════════════

function rnd(lo, hi) { return Math.floor(Math.random() * (hi - lo + 1)) + lo; }
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmtMoney(n) {
  if (n >= 1000000) return '£' + (n/1000000).toFixed(1) + 'm';
  if (n >= 1000)    return '£' + Math.round(n/1000) + 'k';
  return '£' + n;
}
function ordSuffix(n) {
  if (n===1) return 'st'; if (n===2) return 'nd'; if (n===3) return 'rd'; return 'th';
}
function posClass(p) { return p===1?'gold':p<=3?'silver':''; }
function stage() { return STAGES[S.stageIdx]; }
function f1team() { return S.f1TeamIdx !== null ? F1_TEAMS[S.f1TeamIdx] : null; }

function ptsFor(pos) {
  return pos <= PTS_TABLE.length ? PTS_TABLE[pos-1] : 0;
}

// Weighted race position (1-based)
function simRace(totalCars) {
  let score = (S.Pace*0.35 + S.Racecraft*0.30 + S.Consistency*0.25 + S.Fitness*0.10) / 100;
  score += (S.Morale - 50) / 500;

  if (S.stageIdx === 4) {
    // Team car rating replaces tier bonus
    const cr = S.teamCarRating !== null ? S.teamCarRating :
               (f1team() ? (f1team().tier===1?80:f1team().tier===2?55:35) : 35);
    score += (cr - 50) / 300;
  } else {
    score += S.Reputation / 600;
  }

  // Driving style variance
  const style = S.drivingStyle || 'consistent';
  const variance = style==='aggressive' ? 0.28 : style==='consistent' ? 0.14 : 0.20;
  const offset   = style==='aggressive' ? -0.06 : style==='consistent' ? -0.02 : -0.04;
  score += Math.random() * variance + offset;

  // Circuit trait effect
  const circuit = S.currentCircuit;
  if (circuit && circuit.special) {
    const spec = circuit.special;
    if (spec==='monaco')  score += (S.Racecraft - 50) / 300;
    if (spec==='monza')   score += (S.Pace - 50) / 300 + (style==='aggressive' ? 0.03 : 0);
    if (spec==='spa')     score += (S.Racecraft - 50) / 350 + (style==='technical' ? 0.04 : 0);
    if (spec==='suzuka')  score += (S.Consistency - 50) / 300;
    if (spec==='desert')  score += (S.Fitness - 50) / 300;
    if (spec==='home')    score += 0.04 + (S.Morale - 50) / 600;
  }

  // Weather effect from event choice
  score += (S.weatherEffect || 0);

  score += (S.safetyCarEffect || 0);
  score = clamp(score, 0, 1);
  return clamp(Math.round((1-score)*(totalCars-1))+1, 1, totalCars);
}

function buildStandings(aiNames, totalCars, rounds, playerPts) {
  const rivals = aiNames.slice(0, totalCars-1).map(name => {
    const skill = rnd(32,88)/100;
    let pts = 0;
    for (let r=0; r<rounds; r++) {
      const sc = clamp(skill + (Math.random()*0.20-0.04), 0, 1);
      pts += ptsFor(clamp(Math.round((1-sc)*(totalCars-1))+1, 1, totalCars));
    }
    return {name, pts};
  });
  rivals.push({name:S.name, pts:playerPts, me:true});
  rivals.sort((a,b)=>b.pts-a.pts);
  return rivals;
}

function genEvents() {
  // Reset per-season flags
  S.weatherEffect = 0;
  S.weatherRainForecast = false;
  S.safetyCarEffect = 0;

  // Pick circuit for this season
  const stageKey = S.stageIdx === 4 ? 'f1' : S.stageIdx >= 1 ? 'feeder' : 'karting';
  const circuitList = CIRCUITS[stageKey];
  const circuitIdx = (S.circuitSeason || 0) % circuitList.length;
  S.currentCircuit = circuitList[circuitIdx];
  S.circuitSeason = (S.circuitSeason || 0) + 1;

  // Regular events — style-weighted pool
  const style = S.drivingStyle || 'consistent';
  const styleCatMap = {aggressive:['Incident','Rivalry','Fitness'], technical:['Technical','Media','Sponsor'], consistent:['Mental','Career','Team']};
  const preferredCats = styleCatMap[style] || [];
  const pool = [];
  EVENTS.forEach(ev => {
    pool.push(ev);
    if (preferredCats.includes(ev.cat)) pool.push(ev); // 2x weight for matching category
  });
  const count = rnd(3,4);
  const picked = [];
  const usedIds = new Set();
  for (let i=0; i<count && pool.length; i++) {
    let j, ev, attempts = 0;
    do { j = rnd(0, pool.length-1); ev = pool[j]; attempts++; } while (usedIds.has(ev.id) && attempts < 20);
    if (!usedIds.has(ev.id)) { usedIds.add(ev.id); picked.push(ev); }
  }

  // Circuit-specific event
  picked.push(makeCircuitEvent(S.currentCircuit));

  // Weather event (roll rain)
  const rainChance = S.currentCircuit.rain || 0.25;
  if (Math.random() < rainChance) {
    S.weatherRainForecast = true;
    const weatherEv = makeWeatherEvent(S.currentCircuit);
    if (weatherEv) picked.push(weatherEv);
  }

  // Team development event (F1 only)
  if (S.stageIdx === 4 && S.teamCarRating !== null) {
    picked.push(makeTeamDevEvent());
  }

  // Sponsor deal event (F2+, once per deal)
  if (S.stageIdx >= 3) {
    const offered = S.sponsorDealsOffered || [];
    const available = SPONSOR_DEALS.filter(d => !offered.includes(d.id));
    if (available.length && Math.random() < 0.55) {
      const deal = available[rnd(0, available.length-1)];
      if (!S.sponsorDealsOffered) S.sponsorDealsOffered = [];
      S.sponsorDealsOffered.push(deal.id);
      picked.push(makeSponsorEvent(deal));
    }
  }

  // Personal life event (age-gated, one-time per id)
  if (!S.personalEventsShown) S.personalEventsShown = [];
  const eligiblePersonal = PERSONAL_EVENTS.filter(e =>
    S.age >= e.minAge && S.age <= e.maxAge && !S.personalEventsShown.includes(e.id)
  );
  if (eligiblePersonal.length && Math.random() < 0.65) {
    const pe = eligiblePersonal[rnd(0, eligiblePersonal.length-1)];
    picked.push(makePersonalEvent(pe));
  }

  // Nationality event (one-time per id)
  if (!S.natEventsShown) S.natEventsShown = [];
  const natPool = (NAT_EVENTS[S.nat] || []).filter(e => !S.natEventsShown.includes(e.id));
  if (natPool.length && Math.random() < 0.5) {
    const ne = natPool[rnd(0, natPool.length-1)];
    picked.push(makeNatEvent(ne));
  }

  // Burnout crisis event (Burnout >= 80, once)
  if ((S.Burnout || 0) >= 80 && !S.burnoutEventTriggered) {
    S.burnoutEventTriggered = true;
    picked.push(makeBurnoutCrisisEvent());
  }

  // Shuffle
  for (let i=picked.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [picked[i],picked[j]] = [picked[j],picked[i]];
  }

  S.events = picked;
  S.resolved = [];
  S.contractLocked = false;
  S.freeAgent = false;

  // Build season rivals
  const aiPool = S.stageIdx === 4 ? F1_AI : FEEDER_AI;
  const rivalCount = STAGES[S.stageIdx].cars - 1;
  S.seasonRivals = aiPool.slice(0, rivalCount).map((name, i) => ({
    name,
    flag: RIVAL_FLAGS[i % RIVAL_FLAGS.length],
    team: S.stageIdx === 4 ? F1_TEAMS[i % F1_TEAMS.length].name : FEEDER_TEAMS[i % FEEDER_TEAMS.length],
    tier: S.stageIdx === 4 ? F1_TEAMS[i % F1_TEAMS.length].tier : null
  }));
}

function resolveEvent(ei, ci) {
  if (S.resolved.includes(ei)) return;
  const ev = S.events[ei];
  const ch = ev.choices[ci];
  const STATS = ['Pace','Racecraft','Consistency','Fitness','Reputation','Morale'];
  for (const k of STATS) {
    if (k in (ch.fx||{})) S[k] = clamp(S[k] + ch.fx[k], 0, 100);
  }
  if (ch.money) S.earnings += ch.money;
  if (ch.fineByStage) S.earnings = Math.max(0, S.earnings - ch.fineByStage[S.stageIdx]);
  if (ch.contractLocked) S.contractLocked = true;
  if (ch.freeAgent) S.freeAgent = true;
  if (ch.rollFx && Math.random() < ch.rollFx.chance) {
    for (const k of STATS) {
      if (k in (ch.rollFx.fx||{})) S[k] = clamp(S[k] + ch.rollFx.fx[k], 0, 100);
    }
  }
  if (ch.safetyCarChoice === 'gamble') {
    S.safetyCarEffect = parseFloat(((Math.random() * 0.30) - 0.12).toFixed(3));
  } else if (ch.safetyCarChoice === 'safe') {
    S.safetyCarEffect = 0.04;
  }
  if (ch.weatherEffect !== undefined) S.weatherEffect = ch.weatherEffect;
  if (ch.sponsorId) {
    const deal = SPONSOR_DEALS.find(d => d.id === ch.sponsorId);
    if (deal) {
      if (!S.activeSponsors) S.activeSponsors = [];
      S.activeSponsors.push({...deal});
    }
  }
  if (ch.burnoutChange) {
    if (!S.Burnout) S.Burnout = 0;
    S.Burnout = clamp(S.Burnout + ch.burnoutChange, 0, 100);
  }
  if (ev.cat === 'Incident') {
    S.incidentCount = (S.incidentCount || 0) + 1;
  }
  if (ch._peId) {
    if (!S.personalEventsShown) S.personalEventsShown = [];
    if (!S.personalEventsShown.includes(ch._peId)) S.personalEventsShown.push(ch._peId);
  }
  if (ch._neId) {
    if (!S.natEventsShown) S.natEventsShown = [];
    if (!S.natEventsShown.includes(ch._neId)) S.natEventsShown.push(ch._neId);
  }
  S.resolved.push(ei);
  save();
  const card = document.getElementById('tinder-card');
  if (card) {
    card.classList.remove('enter');
    card.classList.add('exit');
    setTimeout(() => renderAll(), 280);
  } else {
    renderAll();
  }
}

// RACE SIMULATION
// ══════════════════════════════════════════════

function raceTheSeason() {
  if (S.resolved.length < S.events.length) return;
  const st = stage();
  const positions = [];
  let playerPts = 0, playerWins = 0, playerPodiums = 0;

  for (let r=0; r<st.rounds; r++) {
    const p = simRace(st.cars);
    positions.push(p);
    playerPts += ptsFor(p);
    if (p===1) playerWins++;
    if (p<=3) playerPodiums++;
  }

  const avgPos = Math.round(positions.reduce((a,b)=>a+b,0)/st.rounds);
  const aiPool = S.stageIdx===4 ? F1_AI : FEEDER_AI;
  const standings = buildStandings(aiPool, st.cars, st.rounds, playerPts);
  const champPos = standings.findIndex(r=>r.me)+1;

  // Build full league standings with flag/team/form
  const rivals = S.seasonRivals || [];
  S.leagueStandings = standings.map(d => {
    const rival = rivals.find(r => r.name === d.name);
    const avgPts = d.pts / st.rounds;
    const form = Array.from({length:5}, () => {
      const rv = Math.random();
      if (avgPts >= 12) return rv < 0.55 ? 'pod' : rv < 0.9 ? 'pts' : 'none';
      if (avgPts >= 4)  return rv < 0.15 ? 'pod' : rv < 0.65 ? 'pts' : 'none';
      return rv < 0.05 ? 'pod' : rv < 0.3 ? 'pts' : 'none';
    });
    const teamName = d.me
      ? (S.stageIdx===4 && f1team() ? f1team().name : st.label)
      : (rival ? rival.team : '');
    const tier = d.me
      ? (S.stageIdx===4 && f1team() ? f1team().tier : null)
      : (rival ? rival.tier : null);
    return {...d, flag: d.me ? S.natFlag : (rival ? rival.flag : ''), team: teamName, form, tier};
  });

  // Resolve sponsor obligations
  const sponsorResults = [];
  if (S.activeSponsors && S.activeSponsors.length) {
    for (const sp of S.activeSponsors) {
      let met = false;
      if (sp.condition === 'top8')   met = champPos <= 8;
      if (sp.condition === 'rep50')  met = S.Reputation >= 50;
      if (sp.condition === 'podium') met = champPos <= 3;
      if (!met && sp.penalty)    S.earnings = Math.max(0, S.earnings - sp.penalty);
      if (met && sp.bonusBonus)  S.earnings += sp.bonusBonus;
      sponsorResults.push({name:sp.name, icon:sp.icon||'📋', met, penalty:sp.penalty||0, bonusBonus:sp.bonusBonus||0, conditionDesc:sp.conditionDesc||''});
    }
    S.activeSponsors = [];
  }
  S.lastSponsorResults = sponsorResults;

  // Earnings
  let seasonEarn;
  if (S.stageIdx===4) {
    const t = f1team();
    seasonEarn = t ? t.pay : 2000000;
    seasonEarn += playerWins * Math.round(seasonEarn * 0.03);
  } else {
    seasonEarn = st.earnings;
    if (champPos===1) seasonEarn = Math.round(seasonEarn * 1.3);
  }
  S.earnings += seasonEarn;
  S.wins += playerWins;
  S.podiums += playerPodiums;
  if (champPos===1) S.championships++;

  // Stat changes from season performance
  const deltas = {};
  function addDelta(k, v) { deltas[k] = (deltas[k]||0) + v; S[k] = clamp(S[k]+v, 0, 100); }

  if (avgPos <= 3) { addDelta('Racecraft',3); }
  if (avgPos <= Math.ceil(st.cars/2)) {
    addDelta('Consistency',2); addDelta('Morale',3); addDelta('Reputation',3);
  } else {
    addDelta('Morale',-4); addDelta('Reputation',-3);
  }
  if (champPos===1) { addDelta('Reputation',8); addDelta('Morale',6); }
  if (playerWins >= 3) addDelta('Reputation',4);
  // Small natural pace growth
  const paceGrow = rnd(0,2);
  if (paceGrow > 0) addDelta('Pace', paceGrow);

  // Promotion / firing / team movement
  let promoted = false, fired = false, promotedTo = null, newTeamName = null;

  if (S.stageIdx < 4) {
    if (champPos <= st.promoteTop) {
      promoted = true;
      promotedTo = STAGES[S.stageIdx+1].label;
    }
    if (avgPos >= st.cars-1 && S.Reputation < 25) { fired = true; }
  } else {
    S.seasonsInF1++;
    const bad = avgPos > 15 && S.Reputation < 35;
    const veryBad = S.consecutiveBadF1 >= 1 && avgPos > 14;
    if (bad || veryBad) {
      fired = true;
      S.consecutiveBadF1++;
    } else {
      S.consecutiveBadF1 = 0;
      // Upgrade team if strong result + not locked
      if (champPos <= 3 && !S.contractLocked) {
        const t = f1team();
        if (t && t.tier > 1) {
          const better = F1_TEAMS.filter(x=>x.tier < t.tier);
          if (better.length) {
            const pick = better[rnd(0,better.length-1)];
            S.f1TeamIdx = F1_TEAMS.indexOf(pick);
            newTeamName = pick.name;
            promoted = true;
            promotedTo = 'Formula 1';
          }
        }
      }
      // Free agent — find new team
      if (S.freeAgent) {
        const tiers = S.Reputation>=70?[1,2]:S.Reputation>=45?[2,3]:[3];
        const eligible = F1_TEAMS.filter(t=>tiers.includes(t.tier));
        const pick = eligible[rnd(0,eligible.length-1)];
        S.f1TeamIdx = F1_TEAMS.indexOf(pick);
        newTeamName = pick.name;
      }
    }
  }

  const wasRain = S.weatherRainForecast || false;
  const circuitName = S.currentCircuit ? S.currentCircuit.name : null;

  const logEntry = {
    season:S.seasonNum, stage:st.label, avgPos, champPos,
    wins:playerWins, podiums:playerPodiums, earnings:seasonEarn,
    champWon:champPos===1, promoted, fired, promotedTo, newTeamName,
    team: S.stageIdx===4 ? f1team()?.name : null,
    wasRain, circuitName
  };
  S.log.unshift(logEntry);

  S.lastResult = {
    ...logEntry, deltas, standings:standings.slice(0,5), totalCars:st.cars,
    sponsorResults
  };

  S.age++;
  S.seasonNum++;

  // Physical decline
  if (S.age > 33) S.Fitness = clamp(S.Fitness - 2, 0, 100);
  if (S.age > 35) S.Pace = clamp(S.Pace - 1, 0, 100);

  // Burnout from race results
  if (!S.Burnout) S.Burnout = 0;
  if (champPos === 1) {
    S.Burnout = clamp(S.Burnout - 5, 0, 100); // winning is energising
  } else if (avgPos > Math.ceil(st.cars * 0.75)) {
    S.Burnout = clamp(S.Burnout + 8, 0, 100); // bad results grind you down
  } else {
    S.Burnout = clamp(S.Burnout + 3, 0, 100); // racing is taxing regardless
  }

  // Burnout forced retirement
  if (S.Burnout >= 100) {
    S.burnoutRetired = true;
    S.gameOver = true;
  }

  // Track monaco/home wins
  const circ = S.currentCircuit;
  if (circ) {
    if (circ.special === 'monaco' && champPos === 1) S.monacoSeasonWins = (S.monacoSeasonWins||0)+1;
    if (circ.special === 'home' && champPos === 1) S.homeSeasonWins = (S.homeSeasonWins||0)+1;
  }
  if (champPos === 2) S.runnerUpCount = (S.runnerUpCount||0)+1;

  // Track consecutive seasons with same F1 team
  if (S.stageIdx === 4) {
    if (S.f1TeamIdx === S.lastF1TeamIdx) {
      S.sameTeamSeasons = (S.sameTeamSeasons||0)+1;
    } else {
      S.sameTeamSeasons = 1;
    }
    S.lastF1TeamIdx = S.f1TeamIdx;
  }

  // Apply promotion/demotion to stage
  if (promoted && S.stageIdx < 4) {
    S.stageIdx++;
    if (S.stageIdx === 4) {
      assignF1Team();
      if (S.firedCount > 0) S.recoveredToF1 = true;
    }
  } else if (fired) {
    S.firedCount++;
    if (S.stageIdx === 4) {
      if (S.firedCount >= 2) {
        S.gameOver = true;
      } else {
        const back = F1_TEAMS.filter(t=>t.tier===3);
        S.f1TeamIdx = F1_TEAMS.indexOf(back[rnd(0,back.length-1)]);
      }
    } else {
      if (S.firedCount >= 3) S.gameOver = true;
    }
  } else {
    S.firedCount = 0;
  }

  if (S.age >= 40) S.gameOver = true;
  if (!S.gameOver) genEvents();

  save();
  showResults();
}

function assignF1Team() {
  const tier = S.Reputation>=70 ? 1 : S.Reputation>=45 ? 2 : 3;
  const pool = F1_TEAMS.filter(t=>t.tier===tier);
  S.f1TeamIdx = F1_TEAMS.indexOf(pool[rnd(0,pool.length-1)]);
  S.teamCarRating = tier===1 ? rnd(72,88) : tier===2 ? rnd(50,68) : rnd(28,46);
}

          </div>
          <div class="hdr-team">${esc(teamStr)} · Season ${S.seasonNum}</div>
          ${S.currentCircuit ? `<div class="circuit-badge">🏁 ${esc(S.currentCircuit.name)}${S.weatherRainForecast?'<span class="rain-tag">· 🌧️ Rain</span>':''}</div>` : ''}
        </div>
      </div>
      <div class="hdr-right">
        <span class="hdr-age">Age ${S.age}</span>
        ${S.age > 33 ? '<span class="veteran-badge">Veteran</span>' : ''}
        <span class="stage-pill">${st.label}</span>
      </div>
    </div>
    <div class="tab-bar">
      <button class="tab-pill${activeTab==='season'?' active':''}" onclick="switchTab('season')">Season</button>
      <button class="tab-pill${activeTab==='car'?' active':''}" onclick="switchTab('car')">🚗 My Car</button>
      <button class="tab-pill${activeTab==='league'?' active':''}" onclick="switchTab('league')">🏆 League</button>
    </div>`;
  // Apply tier glow
  const hdr = document.getElementById('game-header');
  hdr.classList.remove('tier-top','tier-mid','tier-back');
  if (S.stageIdx===4 && t) {
    hdr.classList.add(t.tier===1?'tier-top':t.tier===2?'tier-mid':'tier-back');
  }
}

function renderStats() {
  const KEYS = ['Pace','Racecraft','Consistency','Fitness','Reputation','Morale'];
  const bars = KEYS.map(k => {
    const v = S[k];
    const fc = v>=70?'hi':v>=40?'md':'';
    return `<div class="stat-bar">
      <div class="stat-lbl">
        <span class="stat-name">${k}</span>
        <span class="stat-val">${v}</span>
      </div>
      <div class="stat-track"><div class="stat-fill ${fc}" style="width:0" data-w="${v}%"></div></div>
    </div>`;
  }).join('');

  const st = stage();
  const t = f1team();
  const contractStr = S.stageIdx===4 && t
    ? fmtMoney(t.pay)+'/yr'
    : fmtMoney(st.earnings)+'/season';
  const styleIcons = {aggressive:'🔥',technical:'🧠',consistent:'🎯'};
  const styleLabel = S.drivingStyle || 'consistent';
  const carRatingHtml = (S.stageIdx===4 && S.teamCarRating!==null) ? `
    <div style="margin-top:7px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rs);padding:8px 10px">
      <div style="display:flex;justify-content:space-between;margin-bottom:5px">
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:var(--dim);text-transform:uppercase">Car Rating</span>
        <span style="font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:700;color:var(--gold)">${S.teamCarRating}</span>
      </div>
      <div class="car-rating-track"><div class="car-rating-fill" style="width:${S.teamCarRating}%"></div></div>
    </div>` : '';

  const burnout = S.Burnout || 0;
  const burnoutHtml = burnout >= 50 ? `
    <div class="burnout-warn">
      <span style="font-size:16px">🔥</span>
      <div style="flex:1">
        <div style="display:flex;justify-content:space-between;margin-bottom:4px">
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;font-weight:700;letter-spacing:1px;color:#ff6600;text-transform:uppercase">Burnout</span>
          <span style="font-family:'Barlow Condensed',sans-serif;font-size:11px;color:#ff6600">${burnout}/100</span>
        </div>
        <div class="burnout-track"><div class="burnout-fill" style="width:${burnout}%"></div></div>
        ${burnout >= 80 ? '<div style="font-size:11px;color:#ff4400;margin-top:4px">⚠️ Critical — on the edge of burnout</div>' : ''}
      </div>
    </div>` : '';

  document.getElementById('stats-sec').innerHTML = `
    <div class="section-title">Driver Stats</div>
    <div class="stats-grid">${bars}</div>
    ${carRatingHtml}
    ${burnoutHtml}
    <div class="earn-row">
      <span class="earn-lbl">Career Earnings</span>
      <span class="earn-val">${fmtMoney(S.earnings)}</span>
    </div>
    <div style="display:flex;justify-content:space-between;font-size:11px;color:var(--dim);margin-top:4px;margin-bottom:2px">
      <span>${styleIcons[styleLabel]} ${styleLabel.charAt(0).toUpperCase()+styleLabel.slice(1)}</span>
      <span>Contract: ${contractStr}</span>
    </div>
    <div class="career-row">
      <div class="cs"><div class="cs-val">${S.championships}</div><div class="cs-lbl">Titles</div></div>
      <div class="cs"><div class="cs-val">${S.wins}</div><div class="cs-lbl">Wins</div></div>
      <div class="cs"><div class="cs-val">${S.podiums}</div><div class="cs-lbl">Podiums</div></div>
      <div class="cs"><div class="cs-val">${S.seasonsInF1}</div><div class="cs-lbl">F1 Seasons</div></div>
    </div>`;
  requestAnimationFrame(() => requestAnimationFrame(() => {
    document.querySelectorAll('.stat-fill[data-w]').forEach(el => { el.style.width = el.dataset.w; });
  }));
}

function renderEvents() {
  const total = S.events.length;
  const resolvedCount = S.resolved.length;

  const dots = S.events.map((ev, i) => {
    const isDone = S.resolved.includes(i);
    const firstUnresolved = S.events.findIndex((_, j) => !S.resolved.includes(j));
    const isActive = !isDone && i === firstUnresolved;
    return `<div class="tinder-dot${isDone?' done':isActive?' active':''}"></div>`;
  }).join('');

  if (resolvedCount >= total) {
    document.getElementById('events-sec').innerHTML = `
      <div class="tinder-wrap">
        <div class="tinder-dots">${dots}</div>
        <div class="tinder-all-done">
          <div class="tinder-all-done-icon">✅</div>
          <div class="tinder-all-done-text">All events resolved — ready to race!</div>
        </div>
      </div>`;
    return;
  }

  const ei = S.events.findIndex((_, i) => !S.resolved.includes(i));
  const ev = S.events[ei];

  const choices = ev.choices.map((c, ci) => {
    const tags = Object.entries(c.fx||{}).filter(([,v])=>v!==0).map(([k,v]) => {
      const cls = v>0?'pos':v<0?'neg':'neu';
      return `<span class="fx-tag ${cls}">${k} ${v>0?'+':''}${v}</span>`;
    });
    if (c.money) tags.push(`<span class="fx-tag pos">+${fmtMoney(c.money)}</span>`);
    if (c.fineByStage) tags.push(`<span class="fx-tag neg">−${fmtMoney(c.fineByStage[S.stageIdx])}</span>`);
    if (c.fiaTone) tags.push(`<span class="fx-tag neu">FIA unhappy</span>`);
    if (c.rollFx) tags.push(`<span class="fx-tag neu">30% penalty reversed</span>`);
    if (c.safetyCarChoice==='gamble') tags.push(`<span class="fx-tag neu">Big position swing</span>`);
    if (c.safetyCarChoice==='safe') tags.push(`<span class="fx-tag pos">Consistency +1</span>`);
    if (c.burnoutChange > 0) tags.push(`<span class="fx-tag neg">🔥 +${c.burnoutChange} Burnout</span>`);
    if (c.burnoutChange < 0) tags.push(`<span class="fx-tag pos">🔥 ${c.burnoutChange} Burnout</span>`);
    return `<button class="tinder-choice" onclick="resolveEvent(${ei},${ci})">
      <div>${esc(c.text)}</div>
      ${tags.length ? `<div class="fx" style="margin-top:5px">${tags.join('')}</div>` : ''}
    </button>`;
  }).join('');

  document.getElementById('events-sec').innerHTML = `
    <div class="tinder-wrap">
      <div class="tinder-dots">${dots}</div>
      <div id="tinder-card" class="enter${ev.grave?' grave':''}">
        <div class="tinder-icon">${ev.icon}</div>
        <div class="tinder-cat">${ev.cat}</div>
        <div class="tinder-title">${esc(ev.title)}</div>
        <div class="tinder-desc">${esc(ev.desc)}</div>
        <div class="tinder-choices">${choices}</div>
      </div>
    </div>`;
}

function renderLog() {
  if (!S.log.length) { document.getElementById('log-sec').innerHTML=''; return; }
  const entries = S.log.slice(0,10).map(e => {
    const pc = posClass(e.champPos);
    const sfx = ordSuffix(e.champPos);
    let detail = `Avg P${e.avgPos} · ${fmtMoney(e.earnings)}`;
    if (e.champWon) detail += ' · 🏆 Champion';
    if (e.newTeamName) detail += ` · → ${e.newTeamName}`;
    else if (e.promotedTo && !e.newTeamName) detail += ` · → ${e.promotedTo}`;
    if (e.fired) detail += ' · 🔴 Lost seat';
    return `<div class="log-entry">
      <div class="log-h">
        <span class="log-stage">${e.stage}${e.team?` — ${e.team}`:''}</span>
        <span class="log-pos ${pc}">P${e.champPos}${sfx}</span>
      </div>
      <div class="log-detail">${detail}</div>
    </div>`;
  }).join('');
  document.getElementById('log-sec').innerHTML = `
    <div class="section-title">Career Log</div>
    <div class="log-list">${entries}</div>`;
}

function renderLeague() {
  const el = document.getElementById('league-sec');
  if (!S.leagueStandings) {
    el.innerHTML = `
      <div class="section-title">Championship Standings</div>
      <div style="padding:28px 0;text-align:center;color:var(--dim);font-size:13px">Race your first season to see standings</div>`;
    return;
  }
  const leader = S.leagueStandings[0];
  const rows = S.leagueStandings.map((d, i) => {
    const gap = i===0 ? 'Leader' : `–${leader.pts - d.pts} pts`;
    const pCls = i===0 ? 'p1' : '';
    const meCls = d.me ? 'me-row' : '';
    const formDots = (d.form||[]).map(f=>`<div class="form-dot ${f}"></div>`).join('');
    const tierDot = (d.tier && S.stageIdx===4) ? `<span class="tier-dot t${d.tier}"></span>` : '';
    return `<div class="league-row ${meCls}" style="transition-delay:${i*40}ms">
      <div class="lg-pos ${pCls}">${i+1}</div>
      <div class="lg-flag">${d.flag||''}</div>
      <div class="lg-info">
        <div class="lg-name">${d.me?esc(S.name):esc(d.name)}</div>
        <div class="lg-team">${esc(d.team||'')}${tierDot}</div>
      </div>
      <div>
        <div class="lg-pts">${d.pts}</div>
        <div class="lg-gap">${gap}</div>
      </div>
      <div class="lg-form">${formDots}</div>
    </div>`;
  }).join('');
  el.innerHTML = `
    <div class="section-title">Championship Standings</div>
    <div style="background:var(--bg3);border:1px solid var(--border);border-radius:var(--r);overflow:hidden">${rows}</div>`;
  requestAnimationFrame(() => {
    el.querySelectorAll('.league-row').forEach(row => row.classList.add('visible'));
  });
}

function updateRaceBtn() {
  const btn = document.getElementById('race-btn');
  const sub = document.getElementById('race-sub');
  const ready = S.resolved.length >= S.events.length;
  btn.disabled = !ready;
  if (sub) sub.textContent = ready
    ? `${stage().label} · Age ${S.age}`
    : `Resolve all events first (${S.resolved.length}/${S.events.length})`;
}

function renderResultsCard() {
  const r = S.lastResult;
  if (!r) return;
  const pc = posClass(r.champPos);
  const sfx = ordSuffix(r.champPos);
  const asfx = ordSuffix(r.avgPos);
  const headline = pickHeadline(r);

  // Deltas
  const KEYS = ['Pace','Racecraft','Consistency','Fitness','Reputation','Morale'];
  const deltaHtml = KEYS.filter(k=>r.deltas[k]!==undefined).map(k=>{
    const v = r.deltas[k];
    const cls = v>0?'pos':v<0?'neg':'neu';
    return `<div class="delta">
      <span class="delta-n">${k}</span>
      <span class="delta-v ${cls}">${v>0?'+':''}${v}</span>
    </div>`;
  }).join('');

  const champBanner = r.champWon ? `
    <div class="champ-banner">
      <div class="trophy">🏆</div>
      <h3>${r.stage} Champion!</h3>
      <div style="font-size:12px;color:var(--dim);margin-top:3px">"${effectiveNickname()}" claims the title</div>
    </div>` : '';

  let moveBanner = '';
  if (r.newTeamName) {
    moveBanner = `<div class="move-banner up">🔼 Signed with ${r.newTeamName}</div>`;
  } else if (r.promoted) {
    moveBanner = `<div class="move-banner up">🔼 Promoted to ${r.promotedTo}!</div>`;
  } else if (r.fired) {
    moveBanner = `<div class="move-banner down">🔴 Lost your seat</div>`;
  }

  const rows = r.standings.map((d,i) => {
    return `<tr class="${d.me?'me':''}">
      <td>${i+1}</td>
      <td>${d.me?esc(S.name):d.name}</td>
      <td class="pts">${d.pts}</td>
    </tr>`;
  }).join('');

  const btnLabel = S.gameOver ? 'See Career Summary →' : 'Continue →';

  document.getElementById('res-card').innerHTML = `
    <div class="res-season">${r.stage} · Season ${r.season}</div>
    <div class="res-pos ${pc}">${r.champPos}${sfx}</div>
    <div class="res-sublabel">Championship · Avg P${r.avgPos}${asfx} per race</div>
    <div class="res-headline">"${effectiveNickname()}" — ${esc(headline)}</div>
    ${champBanner}
    ${deltaHtml ? `<div class="deltas-grid">${deltaHtml}</div>` : ''}
    <div class="earn-banner">
      <span class="earn-b-lbl">Season Earnings</span>
      <span class="earn-b-val">${fmtMoney(r.earnings)}</span>
    </div>
    ${moveBanner}
    ${(r.sponsorResults && r.sponsorResults.length) ? `
      <div class="section-title" style="margin:10px 0 6px">Sponsor Obligations</div>
      ${r.sponsorResults.map(sp=>`
        <div class="sponsor-row">
          <div>
            <div class="sponsor-name">${sp.icon} ${esc(sp.name)}</div>
            <div class="sponsor-cond">${sp.conditionDesc} — ${sp.met?'✅ Met':'❌ Failed'}</div>
          </div>
          <div class="sponsor-badge ${sp.met?'pass':'fail'}">${sp.met?(sp.bonusBonus?`+${fmtMoney(sp.bonusBonus)}`:'✓'):`−${fmtMoney(sp.penalty)}`}</div>
        </div>`).join('')}` : ''}
    <div class="section-title" style="margin:0 0 6px">Championship Standings</div>
    <table class="standings">
      <thead><tr><th>#</th><th>Driver</th><th style="text-align:right">PTS</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <button class="btn-continue" onclick="closeResults()">${btnLabel}</button>`;
}

function effectiveNickname() {
  return (S.customNickname && S.customNickname.trim()) ? S.customNickname.trim() : S.nickname;
}

function pickHeadline(r) {
  if (r.wasRain) {
    if (r.champPos === 1) return ['A masterclass in the wet!','Rain master claims the title','Brilliant through the spray'][rnd(0,2)];
    if (r.champPos <= 3)  return ['Stellar wet-weather drive','Cool head in chaotic conditions','Composed through the spray'][rnd(0,2)];
  }
  if (r.circuitName === 'Monaco Royale') {
    if (r.champPos === 1) return ['Monaco Royale champion — the streets belonged to them!','The king of the streets!'][rnd(0,1)];
    if (r.champPos <= 3)  return ['A Monaco podium for the ages','Street fighter shows their class'][rnd(0,1)];
  }
  if (r.circuitName === 'Home Grand Prix') {
    if (r.champPos === 1) return ['Home hero! The crowd goes wild!','The home faithful roar their champion home'][rnd(0,1)];
    if (r.champPos <= 3)  return ['Home podium delights the crowd','Local hero delivers on the big stage'][rnd(0,1)];
  }
  if (r.champWon)       return ['Championship glory at last!','Dominant title campaign','The title is theirs!'][rnd(0,2)];
  if (r.champPos <= 3)  return ['Championship podium — the future is bright','Strong season raises expectations','Closing in on the top'][rnd(0,2)];
  if (r.fired)          return ['A difficult year raises hard questions','Under pressure from all sides','The comeback starts now'][rnd(0,2)];
  if (r.avgPos <= 5)    return ['Impressive pace earns paddock respect','Fast but fortune wasn\'t kind','A season of what-ifs'][rnd(0,2)];
  return ['Experience gained on the road to glory','Character-building campaign','The journey continues'][rnd(0,2)];
}

function renderGameOver() {
  const el = document.getElementById('screen-gameover');
  let reason = 'Career ended — no more seats available';
  if (S.age >= 40) reason = 'Retired at 40';
  else if (S.burnoutRetired) reason = 'Retired — burnout forced the end';
  const rating = calcRating();
  const legacy = calcLegacyTitle();
  const achievements = calcAchievements();

  const stats = [
    {v:S.championships, l:'Championships', g:S.championships>0},
    {v:S.wins,          l:'Race Wins',      g:false},
    {v:S.podiums,       l:'Podiums',        g:false},
    {v:S.seasonsInF1,   l:'F1 Seasons',     g:false},
    {v:S.log.length,    l:'Total Seasons',  g:false},
    {v:fmtMoney(S.earnings), l:'Career Earnings', g:true}
  ];

  const statBoxes = stats.map(s=>`
    <div class="sum-stat">
      <div class="sum-v ${s.g?'gold':''}">${s.v}</div>
      <div class="sum-l">${s.l}</div>
    </div>`).join('');

  const logItems = S.log.map(e=>{
    const pc = posClass(e.champPos);
    const sfx = ordSuffix(e.champPos);
    let d = `Avg P${e.avgPos}`;
    if (e.champWon) d += ' · 🏆';
    if (e.fired) d += ' · 🔴';
    return `<div class="log-entry">
      <div class="log-h">
        <span class="log-stage">${e.stage}${e.team?` — ${e.team}`:''}</span>
        <span class="log-pos ${pc}">P${e.champPos}${sfx}</span>
      </div>
      <div class="log-detail">${d} · ${fmtMoney(e.earnings)}</div>
    </div>`;
  }).join('');

  const achHtml = achievements.length ? achievements.map(a => `
    <div class="achievement">
      <div class="ach-icon">${a.icon}</div>
      <div class="ach-name">${a.name}</div>
      <div class="ach-desc">${a.desc}</div>
    </div>`).join('') : '<div style="color:var(--dim);font-size:13px;padding:8px 0">No special achievements this career.</div>';

  el.innerHTML = `
    <div class="go-title">
      <div style="font-size:48px">🏁</div>
      <h1>Career Over</h1>
      <p>${esc(reason)}</p>
    </div>
    <div class="legacy-box">
      <div class="legacy-title">${legacy.title}</div>
      <div class="legacy-sub">${legacy.desc}</div>
    </div>
    <div class="rating-box">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:11px;letter-spacing:2px;color:var(--dim);text-transform:uppercase;margin-bottom:6px">Career Rating</div>
      <div class="grade">${rating.grade}</div>
      <div class="grade-lbl">${rating.label}</div>
    </div>
    <div class="sum-grid">${statBoxes}</div>
    <div style="width:100%">
      <div class="section-title">Achievements</div>
      <div class="achievements-grid">${achHtml}</div>
    </div>
    <div style="width:100%">
      <div class="section-title">Full Career Log</div>
      <div class="log-list">${logItems}</div>
    </div>
    <button class="btn-primary" onclick="restartGame()" style="margin-top:8px">Play Again</button>`;
}

function calcRating() {
  const sc = S.championships*30 + S.wins*5 + S.podiums*2 + S.seasonsInF1*3;
  if (sc>=200) return {grade:'S', label:'All-time Legend'};
  if (sc>=120) return {grade:'A', label:'Championship Contender'};
  if (sc>=60)  return {grade:'B', label:'Solid F1 Career'};
  if (sc>=25)  return {grade:'C', label:'Journeyman Pro'};
  if (sc>=8)   return {grade:'D', label:'Nearly Made It'};
  return          {grade:'F', label:'Back to Karting'};
}

function calcLegacyTitle() {
  if (S.championships >= 3 && S.wins >= 20) return {title:'Motorsport Icon', desc:'Three titles. Decades of brilliance. Your name belongs in the pantheon.'};
  if (S.championships >= 2) return {title:'Double Champion', desc:'More than once, you conquered the grid. Your legacy is undeniable.'};
  if (S.championships === 1 && S.wins >= 10) return {title:'World Champion', desc:'You reached the summit. Only a handful ever do.'};
  if (S.championships === 1) return {title:'Champion', desc:'Once, the championship was yours. Not everyone gets that moment.'};
  if (S.seasonsInF1 >= 5 && S.podiums >= 10) return {title:'F1 Veteran', desc:'Years in the top flight, countless battles. A respected name in the paddock.'};
  if (S.seasonsInF1 >= 3) return {title:'F1 Racer', desc:'You made it to the pinnacle and competed at the highest level.'};
  if (S.wins >= 5) return {title:'Race Winner', desc:'You stood on the top step. Speed was never your problem.'};
  if (S.podiums >= 3) return {title:'Podium Finisher', desc:'You mixed it with the best and came away with silverware.'};
  if (S.burnoutRetired) return {title:'Burnt Out', desc:"The sport took everything you had. There's no shame in that."};
  return {title:'Journeyman', desc:'You gave everything the sport demanded. Most never make it this far.'};
}

function calcAchievements() {
  const ach = [];
  if (S.championships >= 1) ach.push({icon:'🏆', name:'World Champion', desc:'Won a championship title'});
  if (S.championships >= 3) ach.push({icon:'👑', name:'Dynasty', desc:'Three or more titles'});
  if (S.wins >= 1)  ach.push({icon:'🥇', name:'Race Winner', desc:'Stood on the top step'});
  if (S.wins >= 10) ach.push({icon:'🔟', name:'Ten Wins', desc:'10 race victories'});
  if (S.wins >= 25) ach.push({icon:'🌟', name:'25 Wins', desc:'An all-time great record'});
  if (S.podiums >= 10) ach.push({icon:'🥈', name:'Podium Regular', desc:'10 or more podiums'});
  if (S.seasonsInF1 >= 10) ach.push({icon:'🎖️', name:'F1 Lifer', desc:'10 seasons in Formula 1'});
  if ((S.monacoSeasonWins||0) >= 2) ach.push({icon:'🎰', name:'Monaco Master', desc:'Won at Monaco Royale twice'});
  if ((S.homeSeasonWins||0) >= 1) ach.push({icon:'🏠', name:'Home Hero', desc:'Won the Home Grand Prix'});
  if ((S.runnerUpCount||0) >= 3) ach.push({icon:'😤', name:'The Nearly Man', desc:'Runner-up in championship three times'});
  if ((S.sameTeamSeasons||0) >= 4) ach.push({icon:'🤝', name:'Loyal', desc:'4+ seasons with the same F1 team'});
  if (S.recoveredToF1) ach.push({icon:'💪', name:'Comeback', desc:'Returned to F1 after being dropped'});
  if ((S.incidentCount||0) >= 5) ach.push({icon:'💥', name:'Incident Prone', desc:'5 or more on-track incidents'});
  if (S.burnoutRetired) ach.push({icon:'🔥', name:'Burned Out', desc:'Career ended by total burnout'});
  if (S.earnings >= 50000000) ach.push({icon:'💰', name:'Fifty Million', desc:'£50M+ career earnings'});
  if (ach.length === 0 && S.seasonsInF1 >= 1) ach.push({icon:'🏎️', name:'F1 Driver', desc:'Made it to Formula 1'});
  return ach;
}

function restartGame() {
  clearSave();
  S = null;
  selectedNat = null;
  selectedStyle = 'consistent';
  activeTab = 'season';
  document.getElementById('screen-gameover').style.display = 'none';
  showScreen('start');
  document.getElementById('driver-name').value = '';
  document.querySelectorAll('.nat-btn').forEach(b=>b.classList.remove('sel'));
  document.querySelectorAll('.style-btn').forEach(b=>b.classList.toggle('sel', b.getAttribute('onclick')==="pickStyle('consistent')"));
  document.getElementById('start-btn').disabled = true;
}

function updateCarPreview() {
  const el = document.getElementById('car-preview');
  if (el) el.innerHTML = buildCarSVG();
}

function renderCarTab() {
  const swatches = HELMET_COLORS.map(c =>
    `<button class="helmet-swatch${S.helmetColor===c.hex?' sel':''}"
      style="background:${c.hex}"
      onclick="setHelmetColor('${c.hex}')"
      title="${c.name}"></button>`
  ).join('');

  const liveryCards = LIVERIES.map(l =>
    `<button class="livery-btn${S.livery===l.id?' sel':''}" onclick="setLivery('${l.id}')">
      <div class="livery-preview" style="background:${l.grad}"></div>
      <div class="livery-name">${l.name}</div>
    </button>`
  ).join('');

  document.getElementById('car-sec').innerHTML = `
    <div id="car-preview" style="border-radius:10px;overflow:hidden;margin-bottom:16px">${buildCarSVG()}</div>

    <div class="section-title">Helmet Colour</div>
    <div class="helmet-grid">${swatches}</div>

    <div class="section-title" style="margin-top:18px">Race Number</div>
    <input class="finput car-input" type="number" min="1" max="99"
      placeholder="1–99" value="${esc(S.raceNumber)}"
      oninput="setRaceNumber(this.value)">

    <div class="section-title" style="margin-top:18px">Car Livery</div>
    <div class="livery-grid">${liveryCards}</div>

    <div class="section-title" style="margin-top:18px">Driver Nickname</div>
    <input class="finput car-input" type="text" maxlength="12"
      placeholder="${esc(S.nickname)}"
      value="${esc(S.customNickname)}"
      onchange="setCustomNickname(this.value)">
    <div style="font-size:11px;color:var(--dim);margin-top:6px;margin-bottom:20px">Overrides auto-generated nickname in headlines. Max 12 chars.</div>
  `;
}

function setHelmetColor(hex) {
  S.helmetColor = hex;
  save();
  renderAll();
}

function setLivery(id) {
  S.livery = id;
  save();
  renderAll();
}

function setRaceNumber(val) {
  const n = parseInt(val, 10);
  S.raceNumber = (n >= 1 && n <= 99) ? String(n) : '';
  save();
  updateCarPreview();
  renderHeader();
}

function setCustomNickname(val) {
  S.customNickname = val.trim();
  save();
  renderHeader();
}

// ══════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════

document.addEventListener('DOMContentLoaded', () => {
  buildNatGrid();
  document.getElementById('driver-name').addEventListener('input', checkReady);

  if (load() && S) {
    if (S.gameOver) {
      showScreen('gameover');
      renderGameOver();
    } else {
      showScreen('game');
      renderAll();
    }
  } else {
    showScreen('start');
  }
});
</script>
